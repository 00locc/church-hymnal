<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Church Hymnal Projector — Phoenix Ghanaian SDA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #0d2a5e;
      --blue:       #1a4b9c;
      --blue-light: #3a7bd5;
      --blue-pale:  #e8f0fb;
      --gold:       #c9a84c;
      --gold-dark:  #a8893a;
      --white:      #ffffff;
      --off-white:  #111827;
      --text:       #f0f4ff;
      --text-light: #8a9bbf;
      --border:     #1e3460;
      --surface:    #0f1e3d;
      --font-disp:  'Playfair Display', serif;
      --font-body:  'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: #0a0f1e; color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── HEADER ── */
    #header { background: var(--navy); color: #fff; padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 16px rgba(0,0,0,0.4); border-bottom: 1px solid rgba(201,168,76,0.2); }
    .logo-cross { font-size: 20px; color: var(--gold); }
    .logo-text { font-family: var(--font-disp); font-size: 15px; font-weight: 700; }
    .logo-sub { font-size: 10px; opacity: 0.45; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
    #hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .hdr-pill { display: none; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; background: rgba(201,168,76,0.15); border: 1px solid var(--gold); color: var(--gold); padding: 3px 10px; border-radius: 20px; }
    .hdr-pill.show { display: flex; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: blink 1.1s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
    .hdr-count { font-size: 11px; opacity: 0.4; }

    /* ── LAYOUT ── */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    #sidebar { width: 248px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .search-wrap { padding: 10px; border-bottom: 1px solid var(--border); }
    .search-wrap input { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font-body); background: #0a0f1e; color: var(--text); outline: none; }
    .search-wrap input:focus { border-color: var(--blue-light); }
    .search-wrap input::placeholder { color: var(--text-light); }
    #hymn-list { overflow-y: auto; flex: 1; }
    .hymn-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .hymn-item:hover { background: rgba(58,123,213,0.12); }
    .hymn-item.active { background: rgba(58,123,213,0.18); border-left: 3px solid var(--gold); }
    .hymn-item .num { font-size: 10px; font-weight: 700; color: var(--text-light); letter-spacing: 0.05em; }
    .hymn-item .ttw { font-size: 13px; font-weight: 700; color: var(--text); }
    .hymn-item .ten { font-size: 11px; color: var(--text-light); margin-top: 1px; }
    .sidebar-footer { padding: 9px 10px; border-top: 1px solid var(--border); display: flex; gap: 7px; }
    .sb-btn { flex: 1; padding: 7px; border: 1px dashed var(--border); border-radius: 7px; background: transparent; color: var(--text-light); font-size: 12px; font-family: var(--font-body); cursor: pointer; transition: background 0.1s; }
    .sb-btn:hover { background: rgba(58,123,213,0.12); }
    .sb-btn.danger { color: #e57373; border-color: #5a2020; }

    /* ── PRESENTER ── */
    #presenter { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Slide preview */
    #slide-preview { flex-shrink: 0; margin: 12px 12px 0; background: #060c18; border-radius: 10px; overflow: hidden; aspect-ratio: 16/7; display: flex; box-shadow: 0 4px 24px rgba(0,0,0,0.5); border: 1.5px solid rgba(201,168,76,0.25); position: relative; }
    #preview-stage { flex: 1; display: none; grid-template-columns: 1fr 1px 1fr; }
    #preview-div { background: rgba(255,255,255,0.05); }
    .preview-pane { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 3%; text-align: center; }
    .preview-lang { letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
    .preview-lang.tw { color: var(--gold); font-size: clamp(7px,1vw,11px); }
    .preview-lang.en { color: #7ab8f5; font-size: clamp(7px,1vw,11px); }
    .preview-vlabel { color: rgba(255,255,255,0.25); font-size: clamp(6px,0.7vw,9px); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    #preview-tw { color: #fff; text-align: center; line-height: 1.45; white-space: pre-line; font-weight: 700; font-size: clamp(9px,1.7vw,16px); font-family: var(--font-disp); }
    #preview-en { color: rgba(255,255,255,0.75); text-align: center; line-height: 1.45; white-space: pre-line; font-size: clamp(8px,1.2vw,12px); }
    #preview-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-size: 13px; gap: 6px; width: 100%; }
    #preview-empty .cross { font-size: 28px; color: var(--gold); opacity: 0.3; }
    #slide-preview::before, #slide-preview::after { content: ''; position: absolute; width: 16px; height: 16px; border-color: var(--gold); border-style: solid; opacity: 0.4; }
    #slide-preview::before { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
    #slide-preview::after  { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

    /* Controls */
    #slide-controls { display: flex; align-items: center; gap: 10px; padding: 10px 12px 6px; flex-shrink: 0; }
    #hymn-title-bar { flex: 1; min-width: 0; }
    #hymn-title-bar h2 { font-family: var(--font-disp); font-size: 15px; font-weight: 700; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #hymn-title-bar p { font-size: 11px; color: var(--text-light); margin-top: 1px; }
    #slide-pos { font-size: 12px; color: var(--text-light); font-weight: 700; white-space: nowrap; background: rgba(58,123,213,0.15); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
    .ctrl-btn { padding: 9px 22px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: var(--font-body); cursor: pointer; border: none; white-space: nowrap; transition: all 0.15s; }
    .ctrl-btn:disabled { opacity: 0.2; cursor: default; }
    #btn-prev { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    #btn-prev:not(:disabled):hover { background: rgba(58,123,213,0.2); }
    #btn-next { background: var(--blue); color: #fff; padding: 9px 28px; box-shadow: 0 2px 10px rgba(26,75,156,0.4); }
    #btn-next:not(:disabled):hover { background: var(--blue-light); }

    /* Action row */
    #action-row { display: flex; align-items: center; gap: 8px; padding: 0 12px 8px; flex-shrink: 0; }
    .font-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; font-family: var(--font-body); transition: background 0.1s; }
    .font-btn:hover { background: rgba(58,123,213,0.15); }
    #fs-val { font-size: 12px; font-weight: 700; min-width: 24px; text-align: center; color: var(--text-light); }
    #spacer { flex: 1; }
    #present-btn { padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: var(--font-body); cursor: pointer; border: none; background: var(--gold); color: var(--navy); box-shadow: 0 2px 12px rgba(201,168,76,0.35); display: flex; align-items: center; gap: 7px; transition: all 0.15s; }
    #present-btn:not(:disabled):hover { background: var(--gold-dark); transform: translateY(-1px); }
    #present-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
    #present-btn.presenting { background: #c0392b; color: #fff; box-shadow: 0 2px 12px rgba(192,57,43,0.4); }

    /* Verse strip */
    #verse-strip-wrap { flex: 1; overflow-y: auto; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 5px; }
    #strip-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 0 2px; flex-shrink: 0; }
    .verse-thumb { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; cursor: pointer; flex-shrink: 0; display: grid; grid-template-columns: 58px 1fr 1fr; gap: 0 10px; align-items: start; transition: border-color 0.1s, background 0.1s; }
    .verse-thumb:hover { border-color: var(--blue-light); background: rgba(58,123,213,0.1); }
    .verse-thumb.active { border-color: var(--blue); background: rgba(26,75,156,0.2); }
    .verse-thumb.on-air { border-color: var(--gold); background: rgba(201,168,76,0.08); }
    .vt-label { font-size: 10px; font-weight: 700; color: var(--blue-light); text-transform: uppercase; letter-spacing: 0.06em; padding-top: 1px; }
    .verse-thumb.on-air .vt-label { color: var(--gold); }
    .vt-tw { font-size: 11px; color: var(--text); line-height: 1.5; white-space: pre-line; }
    .vt-en { font-size: 11px; color: var(--text-light); line-height: 1.5; white-space: pre-line; }
    .on-air-tag { font-size: 9px; font-weight: 700; background: var(--gold); color: var(--navy); padding: 1px 5px; border-radius: 8px; margin-left: 4px; }

    /* ── MODAL ── */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
    .modal-bg.show { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 620px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.5); }
    .modal-box h2 { font-family: var(--font-disp); font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
    .mf { margin-bottom: 13px; }
    .mf label { display: block; font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .mf input, .mf textarea { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); background: #0a0f1e; font-family: var(--font-body); outline: none; transition: border-color 0.15s; }
    .mf textarea { min-height: 68px; resize: vertical; }
    .mf input:focus, .mf textarea:focus { border-color: var(--blue-light); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; font-family: var(--font-body); color: var(--text-light); }
    .btn-cancel:hover { background: rgba(255,255,255,0.05); }
    .btn-primary { padding: 9px 22px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: var(--font-body); cursor: pointer; }
    .btn-primary:hover { background: var(--blue-light); }
    .ve-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ve-col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .verse-editor { border: 1px solid var(--border); border-radius: 9px; padding: 11px; margin-bottom: 9px; }
    .ve-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .ve-header input { border: none; background: transparent; font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; outline: none; width: 130px; font-family: var(--font-body); }
    .remove-verse { background: none; border: none; color: #e57373; cursor: pointer; font-size: 16px; line-height: 1; }
    #add-verse-row { display: flex; gap: 7px; margin-top: 4px; flex-wrap: wrap; }
    .avt { padding: 6px 13px; border: 1px dashed var(--border); border-radius: 7px; background: transparent; color: var(--text-light); font-size: 12px; font-family: var(--font-body); cursor: pointer; }
    .avt:hover { background: rgba(58,123,213,0.15); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ══ ADD/EDIT HYMN MODAL ══ -->
<div class="modal-bg" id="hymn-modal-bg" onclick="closeHymnBg(event)">
  <div class="modal-box">
    <h2 id="modal-title">Add New Hymn</h2>
    <div class="mf"><label>Hymn Number</label><input type="number" id="m-num" placeholder="e.g. 42"/></div>
    <div class="mf"><label>Title in Twi</label><input type="text" id="m-tw" placeholder="Twi title..."/></div>
    <div class="mf"><label>Title in English</label><input type="text" id="m-en" placeholder="English title..."/></div>
    <div class="mf">
      <label>Verses</label>
      <div id="verse-editors"></div>
      <div id="add-verse-row">
        <button class="avt" onclick="addVE('Verse')">+ Verse</button>
        <button class="avt" onclick="addVE('Chorus')">+ Chorus</button>
        <button class="avt" onclick="addVE('Bridge')">+ Bridge</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHymnModal()">Cancel</button>
      <button class="btn-primary" onclick="saveHymn()">Save Hymn</button>
    </div>
  </div>
</div>

<!-- ══ HEADER ══ -->
<div id="header">
  <div class="logo-cross">✝</div>
  <div>
    <div class="logo-text">Church Hymnal Projector</div>
    <div class="logo-sub">Phoenix Ghanaian SDA</div>
  </div>
  <div id="hdr-right">
    <div class="hdr-pill" id="live-pill"><div class="pill-dot"></div>PRESENTING</div>
    <span class="hdr-count" id="hymn-count"></span>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="🔍 Search hymns..." oninput="filterHymns(this.value)"/>
    </div>
    <div id="hymn-list"></div>
    <div class="sidebar-footer">
      <button class="sb-btn" onclick="openHymnModal()">+ Add</button>
      <button class="sb-btn" id="edit-btn" style="display:none" onclick="openHymnModal(selectedHymn&&selectedHymn.num)">Edit</button>
      <button class="sb-btn danger" id="del-btn" style="display:none" onclick="deleteHymn()">Delete</button>
    </div>
  </div>

  <!-- Presenter -->
  <div id="presenter">
    <div id="slide-preview">
      <div id="preview-stage">
        <div class="preview-pane">
          <div class="preview-lang tw">Twi</div>
          <div class="preview-vlabel" id="pv-vlabel-tw"></div>
          <div id="preview-tw"></div>
        </div>
        <div id="preview-div"></div>
        <div class="preview-pane">
          <div class="preview-lang en">English</div>
          <div class="preview-vlabel" id="pv-vlabel-en"></div>
          <div id="preview-en"></div>
        </div>
      </div>
      <div id="preview-empty">
        <div class="cross">✝</div>
        <div>Select a hymn to begin</div>
      </div>
    </div>

    <div id="slide-controls">
      <div id="hymn-title-bar">
        <h2 id="ctrl-title">No hymn selected</h2>
        <p id="ctrl-sub"></p>
      </div>
      <span id="slide-pos"></span>
      <button class="ctrl-btn" id="btn-prev" onclick="changeVerse(-1)" disabled>← Prev</button>
      <button class="ctrl-btn" id="btn-next" onclick="changeVerse(1)" disabled>Next →</button>
    </div>

    <div id="action-row">
      <span style="font-size:12px;color:var(--text-light)">Font:</span>
      <button class="font-btn" onclick="changeFont(-2)">A−</button>
      <span id="fs-val">32</span>
      <button class="font-btn" onclick="changeFont(2)">A+</button>
      <div id="spacer"></div>
      <button id="present-btn" onclick="togglePresent()" disabled>▶ Present on TV</button>
    </div>

    <div id="verse-strip-wrap">
      <div id="strip-label">All Verses — click to jump</div>
      <div id="verse-strip"></div>
    </div>
  </div>
</div>

<script>
// ══ STORAGE KEY for syncing between windows ════════════════
const SYNC_KEY  = 'hymnal_sync_v1';
const HYMNS_KEY = 'church_hymns_v4';

// ══ Default Hymns ══════════════════════════════════════════
const DEFAULT_HYMNS = [
  { num:1, tw:"Onyame Ayɛ Yiye", en:"God Has Been Good", verses:[
    { label:"Verse 1", tw:"Onyame ayɛ yiye,\nOyɛ Nyankopɔn kɛse,\nN'adom na ɛhyɛ yɛn ma,\nDaa daa n'ayɛ yiye.", en:"God has been good to us,\nHe is the Almighty God,\nHis grace fills us always,\nForever He is good." },
    { label:"Chorus", tw:"Ayeyi, ayeyi, ayeyi,\nYɛma Onyame ayeyi,\nN'ani so na yɛwɔ,\nYɛma no ayeyi.", en:"Praise, praise, praise,\nWe give God our praise,\nIn His sight we stand,\nWe give Him praise." },
    { label:"Verse 2", tw:"Wahyira yɛn ho,\nWama yɛn ahotɔ,\nN'akoma mu na yɛtena,\nDaa daa n'ayɛ yiye.", en:"He has blessed our lives,\nHe has given us peace,\nIn His heart we dwell,\nForever He is good." }
  ]},
  { num:2, tw:"Yesu Dɔ Me", en:"Jesus Loves Me", verses:[
    { label:"Verse 1", tw:"Yesu dɔ me, me nim saa,\nWɔkyerɛ me Kronkron Nhoma mu,\nMe ntɔkwa ne me hunu,\nOno na ɔwɔ me tumi.", en:"Jesus loves me, this I know,\nFor the Bible tells me so,\nLittle ones to Him belong,\nThey are weak but He is strong." },
    { label:"Chorus", tw:"Yiw, Yesu dɔ me,\nYiw, Yesu dɔ me,\nYiw, Yesu dɔ me,\nWɔkyerɛ me Nhoma mu.", en:"Yes, Jesus loves me,\nYes, Jesus loves me,\nYes, Jesus loves me,\nThe Bible tells me so." },
    { label:"Verse 2", tw:"Yesu dɔ me, ɔkɔe,\nWafiri soro ba ha,\nOsii ase ma me ho,\nMa mentra n'akyiri.", en:"Jesus loves me, He who died,\nHeaven's gate to open wide,\nHe will wash away my sin,\nLet His little child come in." }
  ]},
  { num:3, tw:"Onyankopɔn Adom", en:"Amazing Grace", verses:[
    { label:"Verse 1", tw:"Onyankopɔn adom a ɛyɛ dɛ,\nWanya me a obiara tew,\nMe saa da bi na mereyera,\nNa ɛna me huu ɔkwan.", en:"Amazing grace, how sweet the sound,\nThat saved a wretch like me,\nI once was lost but now am found,\nWas blind but now I see." },
    { label:"Verse 2", tw:"Adom na ɛsraa me akoma,\nMa menya gyidi,\nAdom bɛma me nkwa nyinaa,\nN'adom ma ɔkwan.", en:"'Twas grace that taught my heart to fear,\nAnd grace my fears relieved,\nHow precious did that grace appear,\nThe hour I first believed." },
    { label:"Verse 3", tw:"Bere a me nkwa abɛwiei,\nNa maakɔ soro,\nMɛto dwom ɔkwan no nyinaa,\nNa meda Onyame ase.", en:"When we've been there ten thousand years,\nBright shining as the sun,\nWe've no less days to sing God's praise,\nThan when we first begun." }
  ]},
  { num:4, tw:"Medi Onyame Akyi", en:"I Will Follow God", verses:[
    { label:"Verse 1", tw:"Medi Onyame akyi daa,\nMɛnyɛ n'apɛde nyinaa,\nN'abodwese mu na medi,\nDaa daa medi akyi.", en:"I will follow God always,\nI will do His will each day,\nIn His wisdom I will walk,\nForever I will follow." },
    { label:"Chorus", tw:"Medi akyi, medi akyi,\nMedi Onyame akyi,\nM'akoma nyinaa mu,\nMedi no akyi.", en:"I will follow, I will follow,\nI will follow God above,\nWith all my heart within me,\nI will follow Him." }
  ]},
  { num:5, tw:"Yɛn Ara Yɛn Asaase Ni", en:"This Land Is Ours", verses:[
    { label:"Verse 1", tw:"Yɛn ara yɛn asaase ni,\nEyi nye eyinom ara,\nMohyɛ mo nsa so oo,\nNa mommɔ mo ho ban.", en:"This land is ours, our very own,\nThese are our people here,\nHold fast with your hands,\nAnd guard it well." },
    { label:"Verse 2", tw:"Onyame na ɔhyɛɛ yɛn ma,\nEyi nye eyinom ara,\nYɛda n'ase daa daa,\nYɛma no ayeyi.", en:"God granted this to us,\nThese are our blessings here,\nWe thank Him always,\nWe give Him praise." }
  ]}
];

// ══ State ══════════════════════════════════════════════════
let hymns = [], filtered = [];
let selectedHymn = null, currentVerse = 0;
let fontSize = 32;
let isPresenting = false;
let tvWindow = null;
let editingIdx = null, veCount = 0;

const el  = id => document.getElementById(id);
const txt = (id, v) => { const e=el(id); if(e) e.textContent=v; };

// ══ Sync to TV via localStorage ════════════════════════════
// This works because both windows share the same localStorage
// (same domain, same browser). The TV window listens for changes.
function pushSync() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[currentVerse];
  localStorage.setItem(SYNC_KEY, JSON.stringify({
    active: true,
    hymnNum: selectedHymn.num,
    hymnTw:  selectedHymn.tw,
    hymnEn:  selectedHymn.en,
    verseIdx: currentVerse,
    label:   v.label,
    tw:      v.tw,
    en:      v.en,
    total:   selectedHymn.verses.length,
    fontSize,
    ts:      Date.now()
  }));
}

function clearSync() {
  localStorage.setItem(SYNC_KEY, JSON.stringify({ active: false, ts: Date.now() }));
}

// ══ Presenting ═════════════════════════════════════════════
function togglePresent() {
  if (!selectedHymn) return;
  if (isPresenting) { stopPresenting(); return; }
  startPresenting();
}

function startPresenting() {
  isPresenting = true;

  // Open a NEW window for the TV — user drags it to the TV screen
  // If already open, reuse it
  if (!tvWindow || tvWindow.closed) {
    tvWindow = window.open(
      window.location.href + '?tvmode=1',
      'ChurchHymnalTV',
      'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no'
    );
  }

  el('present-btn').textContent = '⏹ Stop Presenting';
  el('present-btn').classList.add('presenting');
  el('live-pill').classList.add('show');

  // Push current state
  pushSync();
  renderStrip();
}

function stopPresenting() {
  isPresenting = false;
  clearSync();
  el('present-btn').textContent = '▶ Present on TV';
  el('present-btn').classList.remove('presenting');
  el('live-pill').classList.remove('show');
  renderStrip();
}

// ══ Hymn list ══════════════════════════════════════════════
function loadHymns() {
  try { const s=localStorage.getItem(HYMNS_KEY); return s?JSON.parse(s):[...DEFAULT_HYMNS]; }
  catch { return [...DEFAULT_HYMNS]; }
}
function saveHymns() { try{localStorage.setItem(HYMNS_KEY,JSON.stringify(hymns));}catch{} }

function filterHymns(q) {
  q=q.toLowerCase().trim();
  filtered=q?hymns.filter(h=>h.tw.toLowerCase().includes(q)||h.en.toLowerCase().includes(q)||String(h.num).includes(q)):[...hymns];
  filtered.sort((a,b)=>a.num-b.num);
  renderList();
}

function renderList() {
  el('hymn-list').innerHTML = filtered.length===0
    ? '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:12px;">No hymns found</div>'
    : filtered.map(h=>`<div class="hymn-item${selectedHymn&&selectedHymn.num===h.num?' active':''}" onclick="selectHymn(${h.num})">
        <div class="num">No. ${h.num}</div>
        <div class="ttw">${h.tw}</div>
        <div class="ten">${h.en}</div>
      </div>`).join('');
  el('hymn-count').textContent = `${hymns.length} hymns`;
}

function selectHymn(num) {
  selectedHymn = hymns.find(h=>h.num===num);
  currentVerse = 0;
  el('edit-btn').style.display = '';
  el('del-btn').style.display  = '';
  el('present-btn').disabled   = false;
  if (isPresenting) pushSync();
  renderList();
  renderPresenter();
}

// ══ Presenter view ══════════════════════════════════════════
function renderPresenter() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[currentVerse];
  txt('ctrl-title', selectedHymn.tw);
  txt('ctrl-sub', `${selectedHymn.en} · No. ${selectedHymn.num}`);
  txt('slide-pos', `${currentVerse+1} / ${selectedHymn.verses.length}`);
  el('btn-prev').disabled = currentVerse===0;
  el('btn-next').disabled = currentVerse===selectedHymn.verses.length-1;
  el('preview-empty').style.display  = 'none';
  el('preview-stage').style.display  = 'grid';
  txt('pv-vlabel-tw', v.label); txt('pv-vlabel-en', v.label);
  txt('preview-tw', v.tw);      txt('preview-en', v.en);
  renderStrip();
}

function renderStrip() {
  if (!selectedHymn) return;
  el('verse-strip').innerHTML = selectedHymn.verses.map((v,i) => {
    const active = i===currentVerse;
    const onair  = isPresenting && i===currentVerse;
    return `<div class="verse-thumb${active?' active':''}${onair?' on-air':''}" onclick="jumpToVerse(${i})">
      <div class="vt-label">${v.label}${onair?'<span class="on-air-tag">ON AIR</span>':''}</div>
      <div class="vt-tw">${v.tw}</div>
      <div class="vt-en">${v.en}</div>
    </div>`;
  }).join('');
}

function changeVerse(dir) {
  if (!selectedHymn) return;
  const n = currentVerse+dir;
  if (n<0||n>=selectedHymn.verses.length) return;
  jumpToVerse(n);
}

function jumpToVerse(i) {
  currentVerse = i;
  if (isPresenting) pushSync();
  renderPresenter();
}

function changeFont(d) {
  fontSize = Math.max(16, Math.min(80, fontSize+d));
  el('fs-val').textContent = fontSize;
  if (isPresenting) pushSync();
}

// ══ Keyboard shortcuts ══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-bg.show')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); changeVerse(1); }
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); changeVerse(-1); }
  else if (e.key==='Escape' && isPresenting) stopPresenting();
  else if (e.key==='F5' && selectedHymn) { e.preventDefault(); togglePresent(); }
});

// ══ Add/Edit Hymn ══════════════════════════════════════════
function openHymnModal(num) {
  editingIdx=null; veCount=0;
  el('m-num').value=''; el('m-tw').value=''; el('m-en').value='';
  el('verse-editors').innerHTML='';
  el('modal-title').textContent='Add New Hymn';
  if (num!=null) {
    const h=hymns.find(x=>x.num===num); if(!h) return;
    editingIdx=hymns.indexOf(h);
    el('modal-title').textContent='Edit Hymn';
    el('m-num').value=h.num; el('m-tw').value=h.tw; el('m-en').value=h.en;
    h.verses.forEach(v=>addVE(v.label,v.tw,v.en));
  }
  el('hymn-modal-bg').classList.add('show');
}
function closeHymnModal() { el('hymn-modal-bg').classList.remove('show'); }
function closeHymnBg(e)   { if(e.target===el('hymn-modal-bg')) closeHymnModal(); }

function addVE(lb, tw='', en='') {
  veCount++;
  const existing = document.querySelectorAll('.verse-editor').length;
  const label = lb==='Verse'?`Verse ${existing+1}`:lb;
  const id = 've_'+veCount;
  const d = document.createElement('div');
  d.className='verse-editor'; d.id=id;
  d.innerHTML=`<div class="ve-header">
    <input type="text" value="${label}"/>
    <button class="remove-verse" onclick="document.getElementById('${id}').remove()">✕</button>
  </div>
  <div class="ve-cols">
    <div><div class="ve-col-label" style="color:var(--gold)">Twi</div><textarea placeholder="Twi text...">${tw}</textarea></div>
    <div><div class="ve-col-label" style="color:#7ab8f5">English</div><textarea placeholder="English text...">${en}</textarea></div>
  </div>`;
  el('verse-editors').appendChild(d);
}

function saveHymn() {
  const num=parseInt(el('m-num').value);
  const tw=el('m-tw').value.trim();
  const en=el('m-en').value.trim();
  if(!num||!tw||!en){alert('Please fill in number and both titles.');return;}
  const verses=[];
  document.querySelectorAll('.verse-editor').forEach(div=>{
    const label=div.querySelector('input').value.trim();
    const [ta1,ta2]=div.querySelectorAll('textarea');
    if(ta1.value.trim()) verses.push({label,tw:ta1.value.trim(),en:ta2.value.trim()});
  });
  if(!verses.length){alert('Please add at least one verse.');return;}
  const newH={num,tw,en,verses};
  if(editingIdx!==null){ hymns[editingIdx]=newH; if(selectedHymn&&selectedHymn.num===num) selectedHymn=newH; }
  else { if(hymns.find(h=>h.num===num)){alert(`Hymn ${num} already exists.`);return;} hymns.push(newH); }
  hymns.sort((a,b)=>a.num-b.num);
  saveHymns(); closeHymnModal();
  filterHymns(el('search').value);
  if(selectedHymn) renderPresenter();
}

function deleteHymn() {
  if(!selectedHymn||!confirm(`Delete "${selectedHymn.tw}"?`)) return;
  hymns=hymns.filter(h=>h.num!==selectedHymn.num);
  selectedHymn=null; currentVerse=0;
  saveHymns();
  el('edit-btn').style.display='none'; el('del-btn').style.display='none';
  el('preview-stage').style.display='none'; el('preview-empty').style.display='flex';
  el('verse-strip').innerHTML='';
  el('present-btn').disabled=true;
  txt('ctrl-title','No hymn selected'); txt('ctrl-sub','');
  el('btn-prev').disabled=true; el('btn-next').disabled=true;
  filterHymns(el('search').value);
}

// ══ TV MODE — this runs when the window is opened as TV ════
// Detects ?tvmode=1 in the URL and switches to fullscreen display
(function() {
  if (!location.search.includes('tvmode=1')) return;

  // Replace entire body with TV display
  document.title = 'Church Hymnal — TV Display';
  document.body.innerHTML = `
  <style>
    body { margin:0; background:#060c18; font-family:'DM Sans',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
    #tv-topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; flex-shrink:0; border-bottom:1px solid rgba(201,168,76,0.15); }
    #tv-info { color:rgba(255,255,255,0.35); font-size:12px; }
    #tv-counter { color:rgba(255,255,255,0.3); font-size:12px; }
    #tv-badge { font-size:11px; padding:3px 11px; border-radius:20px; background:rgba(201,168,76,0.1); color:#c9a84c; border:1px solid rgba(201,168,76,0.3); display:flex; align-items:center; gap:5px; }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:#c9a84c; animation:blink 1.1s infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
    #tv-stage { flex:1; display:grid; grid-template-columns:1fr 1px 1fr; overflow:hidden; }
    #tv-div { background:rgba(255,255,255,0.05); }
    .tv-pane { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 5vw; text-align:center; }
    .tv-lang { letter-spacing:0.13em; text-transform:uppercase; font-weight:800; margin-bottom:20px; font-family:'DM Sans',sans-serif; }
    #tv-lang-tw { color:#c9a84c; }
    #tv-lang-en { color:#7ab8f5; }
    .tv-vlabel { color:rgba(255,255,255,0.25); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:16px; }
    #tv-tw { color:#fff; line-height:1.5; white-space:pre-line; font-weight:700; text-align:center; font-family:'Playfair Display',serif; }
    #tv-en { color:rgba(255,255,255,0.82); line-height:1.6; white-space:pre-line; text-align:center; }
    #tv-waiting { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; flex:1; }
    #tv-waiting .cross { font-size:52px; color:#c9a84c; opacity:0.3; }
    #tv-waiting p { color:rgba(255,255,255,0.2); font-size:15px; }
    #tv-waiting small { color:rgba(255,255,255,0.1); font-size:12px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
  <div id="tv-topbar" style="display:none">
    <div id="tv-info"></div>
    <div id="tv-counter"></div>
    <div id="tv-badge"><div class="badge-dot"></div>TV Display</div>
  </div>
  <div id="tv-stage" style="display:none">
    <div class="tv-pane">
      <div class="tv-lang" id="tv-lang-tw">Twi</div>
      <div class="tv-vlabel" id="tv-vlabel-tw"></div>
      <div id="tv-tw"></div>
    </div>
    <div id="tv-div"></div>
    <div class="tv-pane">
      <div class="tv-lang" id="tv-lang-en">English</div>
      <div class="tv-vlabel" id="tv-vlabel-en"></div>
      <div id="tv-en"></div>
    </div>
  </div>
  <div id="tv-waiting">
    <div class="cross">✝</div>
    <p>Church Hymnal Projector</p>
    <small>Waiting for presenter...</small>
  </div>`;

  function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

  function applySync(d) {
    if (!d||!d.active) {
      document.getElementById('tv-topbar').style.display='none';
      document.getElementById('tv-stage').style.display='none';
      document.getElementById('tv-waiting').style.display='flex';
      return;
    }
    document.getElementById('tv-topbar').style.display='flex';
    document.getElementById('tv-stage').style.display='grid';
    document.getElementById('tv-waiting').style.display='none';
    const fs = d.fontSize||32;
    s('tv-info', `No. ${d.hymnNum} — ${d.hymnTw}`);
    s('tv-counter', `${d.verseIdx+1} / ${d.total}`);
    s('tv-vlabel-tw', d.label); s('tv-vlabel-en', d.label);
    s('tv-tw', d.tw);           s('tv-en', d.en);
    document.getElementById('tv-tw').style.fontSize      = `clamp(${fs}px,4.5vw,${fs*2.5}px)`;
    document.getElementById('tv-en').style.fontSize      = `clamp(${Math.round(fs*.7)}px,2.8vw,${Math.round(fs*1.8)}px)`;
    document.getElementById('tv-lang-tw').style.fontSize = `clamp(13px,1.5vw,20px)`;
    document.getElementById('tv-lang-en').style.fontSize = `clamp(13px,1.5vw,20px)`;
    document.getElementById('tv-vlabel-tw').style.fontSize = `clamp(10px,1vw,14px)`;
    document.getElementById('tv-vlabel-en').style.fontSize = `clamp(10px,1vw,14px)`;
  }

  // Read current state immediately
  try { applySync(JSON.parse(localStorage.getItem('hymnal_sync_v1')||'{}')); } catch {}

  // Listen for changes from the presenter window in real time
  window.addEventListener('storage', e => {
    if (e.key === 'hymnal_sync_v1') {
      try { applySync(JSON.parse(e.newValue||'{}')); } catch {}
    }
  });

  // Go fullscreen automatically
  document.documentElement.requestFullscreen?.().catch(()=>{});
})();

// ══ INIT (only runs on main presenter window) ══════════════
if (!location.search.includes('tvmode=1')) {
  hymns = loadHymns();
  hymns.sort((a,b)=>a.num-b.num);
  filterHymns('');
  el('preview-stage').style.display='none';
  el('present-btn').disabled=true;
}
</script>
</body>
</html>
