<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Church Hymnal Projector</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1117;
      --surface:   #161b27;
      --surface2:  #1c2333;
      --border:    #232d42;
      --border2:   #2d3a55;
      --text:      #e8edf8;
      --text2:     #8494b4;
      --text3:     #4f6080;
      --gold:      #e2b96a;
      --gold-dim:  #a07a3a;
      --blue:      #4a7fd4;
      --blue-dim:  #2a4f8a;
      --green:     #3dba78;
      --red:       #e05555;
      --font-h:    'Playfair Display', serif;
      --font-b:    'Inter', sans-serif;
      --r:         8px;
    }

    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ════════════════════════════════
       HEADER
    ════════════════════════════════ */
    #header {
      height: 50px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .brand-name { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: var(--text); }
    .brand-sub  { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
    #hdr-right  { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .presenting-badge {
      display: none; align-items: center; gap: 5px;
      background: rgba(61,186,120,0.12); border: 1px solid rgba(61,186,120,0.3);
      color: var(--green); font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .presenting-badge.show { display: flex; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .count-chip { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); }

    /* ════════════════════════════════
       LAYOUT
    ════════════════════════════════ */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ════════════════════════════════
       SIDEBAR
    ════════════════════════════════ */
    #sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    .search-box { padding: 10px; border-bottom: 1px solid var(--border); }
    .search-box input {
      width: 100%; padding: 8px 11px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: var(--r); font-size: 13px; font-family: var(--font-b);
      color: var(--text); outline: none;
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-box input:focus { border-color: var(--blue); }

    #hymn-list { overflow-y: auto; flex: 1; }
    .hymn-item {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .hymn-item:hover { background: var(--surface2); }
    .hymn-item.active {
      background: rgba(74,127,212,0.1);
      border-left: 2px solid var(--gold);
    }
    .h-num  { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.04em; }
    .h-tw   { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 1px; }
    .h-en   { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .sidebar-footer {
      padding: 9px 10px; border-top: 1px solid var(--border);
      display: flex; gap: 6px;
    }
    .sb-btn {
      flex: 1; padding: 7px; border: 1px solid var(--border2);
      border-radius: var(--r); background: transparent;
      color: var(--text2); font-size: 12px; font-family: var(--font-b);
      cursor: pointer; transition: all 0.1s;
    }
    .sb-btn:hover { background: var(--surface2); color: var(--text); }
    .sb-btn.del { color: var(--red); border-color: rgba(224,85,85,0.25); }
    .sb-btn.del:hover { background: rgba(224,85,85,0.08); }

    /* ════════════════════════════════
       PRESENTER PANEL
    ════════════════════════════════ */
    #presenter { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    /* Preview screen */
    #preview-wrap {
      flex-shrink: 0; margin: 12px 12px 0;
      background: #060911; border-radius: 10px;
      aspect-ratio: 16/7; overflow: hidden;
      border: 1px solid var(--border2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: flex; position: relative;
    }
    /* subtle corner accents */
    #preview-wrap::before,#preview-wrap::after {
      content:''; position:absolute; width:14px; height:14px;
      border-style:solid; border-color:var(--gold-dim); opacity:0.5;
    }
    #preview-wrap::before { top:6px; left:6px; border-width:1.5px 0 0 1.5px; }
    #preview-wrap::after  { bottom:6px; right:6px; border-width:0 1.5px 1.5px 0; }

    #preview-grid { flex:1; display:none; grid-template-columns:1fr 1px 1fr; }
    .prev-sep { background: rgba(255,255,255,0.05); }
    .prev-pane {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:10px 3%; text-align:center;
    }
    .prev-lang {
      text-transform:uppercase; letter-spacing:0.1em; font-weight:700; margin-bottom:5px;
    }
    .prev-lang.tw { color:var(--gold); font-size:clamp(7px,1vw,10px); }
    .prev-lang.en { color:var(--blue); font-size:clamp(7px,1vw,10px); }
    .prev-label { color:rgba(255,255,255,0.22); font-size:clamp(6px,0.7vw,9px); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
    #prev-tw { color:#fff; font-family:var(--font-h); font-weight:700; font-size:clamp(9px,1.7vw,16px); line-height:1.4; white-space:pre-line; text-align:center; }
    #prev-en { color:rgba(255,255,255,0.85); font-family:var(--font-h); font-weight:700; font-size:clamp(9px,1.7vw,16px); line-height:1.4; white-space:pre-line; text-align:center; }

    #preview-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      width:100%; gap:8px; color:var(--text3);
    }
    #preview-empty .icon { font-size:28px; opacity:0.35; }
    #preview-empty p { font-size:13px; }

    /* Controls bar */
    #controls {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px 6px; flex-shrink:0;
    }
    #hymn-info { flex:1; min-width:0; }
    #hymn-info h2 { font-family:var(--font-h); font-size:15px; font-weight:700; color:var(--gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #hymn-info p  { font-size:11px; color:var(--text2); margin-top:1px; }
    .pos-badge { font-size:12px; font-weight:600; color:var(--text2); background:var(--surface2); padding:4px 10px; border-radius:20px; border:1px solid var(--border); white-space:nowrap; }

    .nav-btn {
      padding:9px 20px; border-radius:var(--r);
      font-size:14px; font-weight:600; font-family:var(--font-b);
      cursor:pointer; border:none; white-space:nowrap; transition:all 0.15s;
    }
    .nav-btn:disabled { opacity:0.2; cursor:default; }
    #btn-prev { background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:9px 18px; }
    #btn-prev:not(:disabled):hover { background:var(--border2); }
    #btn-next { background:var(--blue); color:#fff; padding:9px 24px; box-shadow:0 2px 10px rgba(74,127,212,0.3); }
    #btn-next:not(:disabled):hover { background:#5a8fe4; }

    /* Action row */
    #action-row {
      display:flex; align-items:center; gap:8px;
      padding:4px 12px 8px; flex-shrink:0;
    }
    .font-btn {
      padding:4px 10px; border:1px solid var(--border2); border-radius:6px;
      background:var(--surface2); color:var(--text2); cursor:pointer;
      font-size:13px; font-family:var(--font-b); transition:all 0.1s;
    }
    .font-btn:hover { background:var(--border2); color:var(--text); }
    #fs-val { font-size:12px; font-weight:600; min-width:24px; text-align:center; color:var(--text2); }
    #gap { flex:1; }

    #present-btn {
      padding:10px 26px; border-radius:var(--r);
      font-size:14px; font-weight:700; font-family:var(--font-b);
      cursor:pointer; border:none;
      background:var(--gold); color:#0e1117;
      box-shadow:0 2px 14px rgba(226,185,106,0.3);
      display:flex; align-items:center; gap:7px;
      transition:all 0.15s;
    }
    #present-btn:not(:disabled):hover { background:#ecc97a; transform:translateY(-1px); }
    #present-btn:disabled { opacity:0.3; cursor:default; transform:none; box-shadow:none; }
    #present-btn.active { background:var(--red); color:#fff; box-shadow:0 2px 14px rgba(224,85,85,0.35); }
    #present-btn.active:hover { background:#e86868; }

    /* Verse strip */
    #strip-wrap { flex:1; overflow-y:auto; padding:0 12px 12px; display:flex; flex-direction:column; gap:5px; }
    #strip-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:4px 0 2px; flex-shrink:0; }
    .v-thumb {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--r); padding:9px 12px; cursor:pointer; flex-shrink:0;
      display:grid; grid-template-columns:56px 1fr 1fr; gap:0 10px; align-items:start;
      transition:all 0.1s;
    }
    .v-thumb:hover { background:var(--surface2); border-color:var(--border2); }
    .v-thumb.cur  { border-color:var(--blue); background:rgba(74,127,212,0.08); }
    .v-thumb.live { border-color:var(--gold); background:rgba(226,185,106,0.06); }
    .vt-lbl { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.06em; padding-top:1px; }
    .v-thumb.live .vt-lbl { color:var(--gold); }
    .vt-tw  { font-size:11px; font-weight:600; color:var(--text); line-height:1.5; white-space:pre-line; }
    .vt-en  { font-size:11px; font-weight:600; color:var(--text); line-height:1.5; white-space:pre-line; }
    .air-tag { font-size:9px; font-weight:700; background:var(--gold); color:#0e1117; padding:1px 5px; border-radius:6px; margin-left:4px; }

    /* ════════════════════════════════
       FULLSCREEN PRESENTATION VIEW
       (overlays the whole page)
    ════════════════════════════════ */
    #pres-view {
      display:none; position:fixed; inset:0; z-index:9999;
      background:#060911;
      flex-direction:column;
    }
    #pres-view.show { display:flex; }

    #pres-topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 20px; flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    #pres-meta { color:rgba(255,255,255,0.3); font-size:12px; }
    #pres-count { color:rgba(255,255,255,0.25); font-size:12px; }
    #pres-stop {
      font-size:12px; font-weight:600; font-family:var(--font-b);
      color:rgba(255,255,255,0.35); background:none;
      border:1px solid rgba(255,255,255,0.12); border-radius:6px;
      padding:5px 13px; cursor:pointer; transition:all 0.15s;
    }
    #pres-stop:hover { color:#fff; border-color:rgba(255,255,255,0.3); }

    #pres-stage {
      flex:1; display:grid; grid-template-columns:1fr 1px 1fr; overflow:hidden;
    }
    .pres-sep { background:rgba(255,255,255,0.05); }
    .pres-pane {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px 6vw; text-align:center;
    }
    .pres-lang {
      letter-spacing:0.13em; text-transform:uppercase;
      font-weight:700; margin-bottom:20px;
    }
    #pres-lang-tw { color:var(--gold); }
    #pres-lang-en { color:var(--blue); }
    .pres-label { color:rgba(255,255,255,0.2); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:14px; }
    #pres-tw { color:#fff; font-family:var(--font-h); font-weight:700; line-height:1.5; white-space:pre-line; text-align:center; }
    #pres-en { color:rgba(255,255,255,0.78); font-family:var(--font-h); font-weight:700; line-height:1.5; white-space:pre-line; text-align:center; }

    #pres-nav {
      display:flex; align-items:center; justify-content:center;
      gap:12px; padding:14px; flex-shrink:0;
      border-top:1px solid rgba(255,255,255,0.05);
    }
    .pnav {
      padding:10px 32px; border-radius:var(--r);
      font-size:14px; font-weight:700; font-family:var(--font-b);
      cursor:pointer; border:none; transition:all 0.15s;
    }
    .pnav:disabled { opacity:0.18; cursor:default; }
    #pnav-prev { background:rgba(255,255,255,0.07); color:#fff; border:1px solid rgba(255,255,255,0.12); }
    #pnav-prev:not(:disabled):hover { background:rgba(255,255,255,0.13); }
    #pnav-next { background:var(--gold); color:#0e1117; box-shadow:0 2px 12px rgba(226,185,106,0.3); }
    #pnav-next:not(:disabled):hover { background:#ecc97a; }
    #pres-pos { color:rgba(255,255,255,0.25); font-size:13px; font-weight:600; min-width:60px; text-align:center; }

    /* ════════════════════════════════
       MODAL
    ════════════════════════════════ */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center; }
    .modal-bg.show { display:flex; }
    .modal-box { background:var(--surface2); border:1px solid var(--border2); border-radius:12px; padding:26px; width:620px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,0.5); }
    .modal-box h2 { font-family:var(--font-h); font-size:19px; font-weight:700; color:var(--gold); margin-bottom:16px; }
    .mf { margin-bottom:12px; }
    .mf label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
    .mf input,.mf textarea { width:100%; padding:9px 11px; border:1px solid var(--border2); border-radius:var(--r); font-size:13px; color:var(--text); background:var(--bg); font-family:var(--font-b); outline:none; transition:border-color 0.15s; }
    .mf textarea { min-height:68px; resize:vertical; }
    .mf input:focus,.mf textarea:focus { border-color:var(--blue); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
    .btn-cancel { padding:8px 16px; border:1px solid var(--border2); border-radius:var(--r); background:transparent; cursor:pointer; font-size:13px; font-family:var(--font-b); color:var(--text2); }
    .btn-cancel:hover { background:rgba(255,255,255,0.05); }
    .btn-ok { padding:8px 20px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:13px; font-weight:700; font-family:var(--font-b); cursor:pointer; }
    .btn-ok:hover { background:#5a8fe4; }
    .ve-cols { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .ve-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
    .verse-editor { border:1px solid var(--border2); border-radius:var(--r); padding:11px; margin-bottom:8px; }
    .ve-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .ve-head input { border:none; background:transparent; font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.07em; outline:none; width:130px; font-family:var(--font-b); }
    .rm-v { background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; line-height:1; }
    #add-v-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
    .avt { padding:5px 12px; border:1px dashed var(--border2); border-radius:6px; background:transparent; color:var(--text2); font-size:12px; font-family:var(--font-b); cursor:pointer; }
    .avt:hover { background:var(--surface2); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  </style>
</head>
<body>

<!-- ══ FULLSCREEN PRESENTATION OVERLAY ══ -->
<div id="pres-view">
  <div id="pres-topbar">
    <div id="pres-meta"></div>
    <div id="pres-count"></div>
    <button id="pres-stop" onclick="stopPresenting()">✕ Stop Presenting (Esc)</button>
  </div>
  <div id="pres-stage">
  <div class="pres-pane">
  <div class="pres-lang" id="pres-lang-en">English</div>
  <div class="pres-label" id="pres-lbl-en" style="font-size:clamp(10px,1vw,14px)"></div>
  <div id="pres-en"></div>
  </div>
  <div class="pres-sep"></div>
  <div class="pres-pane">
  <div class="pres-lang" id="pres-lang-tw">Twi</div>
  <div class="pres-label" id="pres-lbl-tw" style="font-size:clamp(10px,1vw,14px)"></div>
  <div id="pres-tw"></div>
  </div>
  </div>
  <div id="pres-nav">
    <button class="pnav" id="pnav-prev" onclick="go(-1)">← Prev</button>
    <span id="pres-pos"></span>
    <button class="pnav" id="pnav-next" onclick="go(1)">Next →</button>
  </div>
</div>

<!-- ══ HYMN MODAL ══ -->
<div class="modal-bg" id="modal-bg" onclick="closeMBg(event)">
  <div class="modal-box">
    <h2 id="modal-title">Add New Hymn</h2>
    <div class="mf"><label>Hymn Number</label><input type="number" id="m-num" placeholder="e.g. 42"/></div>
    <div class="mf"><label>Title in Twi</label><input type="text" id="m-tw" placeholder="Twi title..."/></div>
    <div class="mf"><label>Title in English</label><input type="text" id="m-en" placeholder="English title..."/></div>
    <div class="mf">
      <label>Verses</label>
      <div id="v-editors"></div>
      <div id="add-v-row">
        <button class="avt" onclick="addVE('Verse')">+ Verse</button>
        <button class="avt" onclick="addVE('Chorus')">+ Chorus</button>
        <button class="avt" onclick="addVE('Bridge')">+ Bridge</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="saveHymn()">Save Hymn</button>
    </div>
  </div>
</div>

<!-- ══ HEADER ══ -->
<div id="header">
  <div class="brand">
    <div class="brand-icon">✝</div>
    <div>
      <div class="brand-name">Hymnal Projector</div>
      <div class="brand-sub">Phoenix Ghanaian SDA</div>
    </div>
  </div>
  <div id="hdr-right">
    <div class="presenting-badge" id="pres-badge"><div class="badge-dot"></div>Presenting</div>
    <div class="count-chip" id="hymn-count">0 hymns</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search hymns..." oninput="filter(this.value)"/>
    </div>
    <div id="hymn-list"></div>
    <div class="sidebar-footer">
      <button class="sb-btn" onclick="openModal()">+ Add</button>
      <button class="sb-btn" id="btn-edit" style="display:none" onclick="openModal(selectedHymn&&selectedHymn.num)">Edit</button>
      <button class="sb-btn del" id="btn-del" style="display:none" onclick="delHymn()">Delete</button>
    </div>
  </div>

  <!-- Presenter -->
  <div id="presenter">

    <!-- Preview -->
    <div id="preview-wrap">
      <div id="preview-grid">
        <div class="prev-pane">
          <div class="prev-lang en">English</div>
          <div class="prev-label" id="pv-lbl-en"></div>
          <div id="prev-en"></div>
        </div>
        <div class="prev-sep"></div>
        <div class="prev-pane">
          <div class="prev-lang tw">Twi</div>
          <div class="prev-label" id="pv-lbl-tw"></div>
          <div id="prev-tw"></div>
        </div>
      </div>
      <div id="preview-empty">
        <div class="icon">♪</div>
        <p>Select a hymn to begin</p>
      </div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <div id="hymn-info">
        <h2 id="info-tw">No hymn selected</h2>
        <p id="info-en"></p>
      </div>
      <span class="pos-badge" id="pos-badge" style="display:none"></span>
      <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Prev</button>
      <button class="nav-btn" id="btn-next" onclick="go(1)" disabled>Next →</button>
    </div>

    <!-- Actions -->
    <div id="action-row">
      <span style="font-size:12px;color:var(--text3)">Font:</span>
      <button class="font-btn" onclick="chFont(-2)">A−</button>
      <span id="fs-val">32</span>
      <button class="font-btn" onclick="chFont(2)">A+</button>
      <div id="gap"></div>
      <button id="present-btn" onclick="togglePresent()" disabled>▶ Present</button>
    </div>

    <!-- Verse strip -->
    <div id="strip-wrap">
      <div id="strip-label">All Verses — click any to jump</div>
      <div id="verse-strip"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DEFAULT HYMNS
// ═══════════════════════════════════════════════
const HYMNS_KEY = 'church_hymns_v5';
const DEFAULTS = [
  { num:1, tw:"Onyame Ayɛ Yiye", en:"God Has Been Good", verses:[
    { label:"Verse 1", tw:"Onyame ayɛ yiye,\nOyɛ Nyankopɔn kɛse,\nN'adom na ɛhyɛ yɛn ma,\nDaa daa n'ayɛ yiye.", en:"God has been good to us,\nHe is the Almighty God,\nHis grace fills us always,\nForever He is good." },
    { label:"Chorus", tw:"Ayeyi, ayeyi, ayeyi,\nYɛma Onyame ayeyi,\nN'ani so na yɛwɔ,\nYɛma no ayeyi.", en:"Praise, praise, praise,\nWe give God our praise,\nIn His sight we stand,\nWe give Him praise." },
    { label:"Verse 2", tw:"Wahyira yɛn ho,\nWama yɛn ahotɔ,\nN'akoma mu na yɛtena,\nDaa daa n'ayɛ yiye.", en:"He has blessed our lives,\nHe has given us peace,\nIn His heart we dwell,\nForever He is good." }
  ]},
  { num:2, tw:"Yesu Dɔ Me", en:"Jesus Loves Me", verses:[
    { label:"Verse 1", tw:"Yesu dɔ me, me nim saa,\nWɔkyerɛ me Kronkron Nhoma mu,\nMe ntɔkwa ne me hunu,\nOno na ɔwɔ me tumi.", en:"Jesus loves me, this I know,\nFor the Bible tells me so,\nLittle ones to Him belong,\nThey are weak but He is strong." },
    { label:"Chorus", tw:"Yiw, Yesu dɔ me,\nYiw, Yesu dɔ me,\nYiw, Yesu dɔ me,\nWɔkyerɛ me Nhoma mu.", en:"Yes, Jesus loves me,\nYes, Jesus loves me,\nYes, Jesus loves me,\nThe Bible tells me so." },
    { label:"Verse 2", tw:"Yesu dɔ me, ɔkɔe,\nWafiri soro ba ha,\nOsii ase ma me ho,\nMa mentra n'akyiri.", en:"Jesus loves me, He who died,\nHeaven's gate to open wide,\nHe will wash away my sin,\nLet His little child come in." }
  ]},
  { num:3, tw:"Onyankopɔn Adom", en:"Amazing Grace", verses:[
    { label:"Verse 1", tw:"Onyankopɔn adom a ɛyɛ dɛ,\nWanya me a obiara tew,\nMe saa da bi na mereyera,\nNa ɛna me huu ɔkwan.", en:"Amazing grace, how sweet the sound,\nThat saved a wretch like me,\nI once was lost but now am found,\nWas blind but now I see." },
    { label:"Verse 2", tw:"Adom na ɛsraa me akoma,\nMa menya gyidi,\nAdom bɛma me nkwa nyinaa,\nN'adom ma ɔkwan.", en:"'Twas grace that taught my heart to fear,\nAnd grace my fears relieved,\nHow precious did that grace appear,\nThe hour I first believed." },
    { label:"Verse 3", tw:"Bere a me nkwa abɛwiei,\nNa maakɔ soro,\nMɛto dwom ɔkwan no nyinaa,\nNa meda Onyame ase.", en:"When we've been there ten thousand years,\nBright shining as the sun,\nWe've no less days to sing God's praise,\nThan when we first begun." }
  ]},
  { num:4, tw:"Medi Onyame Akyi", en:"I Will Follow God", verses:[
    { label:"Verse 1", tw:"Medi Onyame akyi daa,\nMɛnyɛ n'apɛde nyinaa,\nN'abodwese mu na medi,\nDaa daa medi akyi.", en:"I will follow God always,\nI will do His will each day,\nIn His wisdom I will walk,\nForever I will follow." },
    { label:"Chorus", tw:"Medi akyi, medi akyi,\nMedi Onyame akyi,\nM'akoma nyinaa mu,\nMedi no akyi.", en:"I will follow, I will follow,\nI will follow God above,\nWith all my heart within me,\nI will follow Him." }
  ]},
  { num:5, tw:"Yɛn Ara Yɛn Asaase Ni", en:"This Land Is Ours", verses:[
    { label:"Verse 1", tw:"Yɛn ara yɛn asaase ni,\nEyi nye eyinom ara,\nMohyɛ mo nsa so oo,\nNa mommɔ mo ho ban.", en:"This land is ours, our very own,\nThese are our people here,\nHold fast with your hands,\nAnd guard it well." },
    { label:"Verse 2", tw:"Onyame na ɔhyɛɛ yɛn ma,\nEyi nye eyinom ara,\nYɛda n'ase daa daa,\nYɛma no ayeyi.", en:"God granted this to us,\nThese are our blessings here,\nWe thank Him always,\nWe give Him praise." }
  ]}
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let hymns = [], filtered = [];
let selectedHymn = null, verse = 0, fontSize = 32;
let presenting = false;
let editIdx = null, veN = 0;

const $ = id => document.getElementById(id);
const T = (id, v) => { const e=$(id); if(e) e.textContent=v; };

// ═══════════════════════════════════════════════
// HYMN DATA
// ═══════════════════════════════════════════════
function loadHymns() {
  try { const s=localStorage.getItem(HYMNS_KEY); return s?JSON.parse(s):[...DEFAULTS]; }
  catch { return [...DEFAULTS]; }
}
function saveHymns() { try{localStorage.setItem(HYMNS_KEY,JSON.stringify(hymns));}catch{} }

function filter(q) {
  q=q.toLowerCase().trim();
  filtered=q?hymns.filter(h=>h.tw.toLowerCase().includes(q)||h.en.toLowerCase().includes(q)||String(h.num).includes(q)):[...hymns];
  filtered.sort((a,b)=>a.num-b.num);
  renderList();
}

function renderList() {
  $('hymn-list').innerHTML = filtered.length===0
    ? '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">No hymns found</div>'
    : filtered.map(h=>`<div class="hymn-item${selectedHymn&&selectedHymn.num===h.num?' active':''}" onclick="pick(${h.num})">
        <div class="h-num">No. ${h.num}</div>
        <div class="h-tw">${h.tw}</div>
        <div class="h-en">${h.en}</div>
      </div>`).join('');
  $('hymn-count').textContent=`${hymns.length} hymn${hymns.length!==1?'s':''}`;
}

function pick(num) {
  selectedHymn = hymns.find(h=>h.num===num);
  verse = 0;
  $('btn-edit').style.display='';
  $('btn-del').style.display='';
  $('present-btn').disabled=false;
  renderList(); renderPresenter();
  if (presenting) renderPres();
}

// ═══════════════════════════════════════════════
// PRESENTER PANEL
// ═══════════════════════════════════════════════
function renderPresenter() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[verse];
  T('info-tw', selectedHymn.tw);
  T('info-en', `${selectedHymn.en} · No. ${selectedHymn.num}`);
  T('pos-badge', `${verse+1} / ${selectedHymn.verses.length}`);
  $('pos-badge').style.display='';
  $('btn-prev').disabled = verse===0;
  $('btn-next').disabled = verse===selectedHymn.verses.length-1;
  // mini preview
  $('preview-empty').style.display='none';
  $('preview-grid').style.display='grid';
  T('pv-lbl-en', v.label); T('pv-lbl-tw', v.label);
  T('prev-en', v.en);      T('prev-tw', v.tw);
  renderStrip();
}

function renderStrip() {
  if (!selectedHymn) return;
  $('verse-strip').innerHTML = selectedHymn.verses.map((v,i)=>{
    const cur  = i===verse;
    const live = presenting && i===verse;
    return `<div class="v-thumb${cur?' cur':''}${live?' live':''}" onclick="jump(${i})">
      <div class="vt-lbl">${v.label}${live?'<span class="air-tag">ON AIR</span>':''}</div>
      <div class="vt-en">${v.en}</div>
      <div class="vt-tw">${v.tw}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// PRESENTATION (fullscreen overlay)
// ═══════════════════════════════════════════════
function togglePresent() {
  if (!selectedHymn) return;
  presenting ? stopPresenting() : startPresenting();
}

function startPresenting() {
  presenting = true;
  $('pres-view').classList.add('show');
  $('present-btn').textContent = '⏹ Stop';
  $('present-btn').classList.add('active');
  $('pres-badge').classList.add('show');
  renderPres();
  // Go fullscreen — this fills your entire screen including the TV via Windows Cast
  document.documentElement.requestFullscreen?.().catch(()=>{});
}

function stopPresenting() {
  presenting = false;
  $('pres-view').classList.remove('show');
  $('present-btn').textContent = '▶ Present';
  $('present-btn').classList.remove('active');
  $('pres-badge').classList.remove('show');
  if (document.fullscreenElement) document.exitFullscreen?.();
  renderStrip();
}

function renderPres() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[verse];
  const tot = selectedHymn.verses.length;
  const fs  = fontSize;
  T('pres-meta', `No. ${selectedHymn.num} — ${selectedHymn.tw}`);
  T('pres-count', `${verse+1} of ${tot}`);
  T('pres-lbl-tw', v.label); T('pres-lbl-en', v.label);
  T('pres-tw', v.tw);        T('pres-en', v.en);
  T('pres-pos', `${verse+1} / ${tot}`);
  $('pres-tw').style.fontSize = `clamp(${fs}px,4.2vw,${fs*2.4}px)`;
  $('pres-en').style.fontSize = `clamp(${fs}px,4.2vw,${fs*2.4}px)`;
  $('pres-lang-tw').style.fontSize = `clamp(12px,1.4vw,18px)`;
  $('pres-lang-en').style.fontSize = `clamp(12px,1.4vw,18px)`;
  $('pres-lbl-tw').style.fontSize  = `clamp(9px,0.9vw,13px)`;
  $('pres-lbl-en').style.fontSize  = `clamp(9px,0.9vw,13px)`;
  $('pnav-prev').disabled = verse===0;
  $('pnav-next').disabled = verse===tot-1;
  renderStrip();
}

function go(dir) {
  if (!selectedHymn) return;
  const n = verse+dir;
  if (n<0||n>=selectedHymn.verses.length) return;
  jump(n);
}

function jump(i) {
  verse = i;
  renderPresenter();
  if (presenting) renderPres();
}

function chFont(d) {
  fontSize = Math.max(14, Math.min(80, fontSize+d));
  $('fs-val').textContent = fontSize;
  if (presenting) renderPres();
}

// ═══════════════════════════════════════════════
// KEYBOARD  (Space/Arrows = next/prev like PPT)
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-bg.show')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); go(1); }
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); go(-1); }
  else if (e.key==='Escape') { if(presenting) stopPresenting(); }
  else if (e.key==='F5'&&selectedHymn) { e.preventDefault(); togglePresent(); }
});

// ═══════════════════════════════════════════════
// ADD / EDIT HYMN
// ═══════════════════════════════════════════════
function openModal(num) {
  editIdx=null; veN=0;
  $('m-num').value=''; $('m-tw').value=''; $('m-en').value='';
  $('v-editors').innerHTML='';
  $('modal-title').textContent='Add New Hymn';
  if (num!=null) {
    const h=hymns.find(x=>x.num===num); if(!h) return;
    editIdx=hymns.indexOf(h);
    $('modal-title').textContent='Edit Hymn';
    $('m-num').value=h.num; $('m-tw').value=h.tw; $('m-en').value=h.en;
    h.verses.forEach(v=>addVE(v.label,v.tw,v.en));
  }
  $('modal-bg').classList.add('show');
}
function closeModal() { $('modal-bg').classList.remove('show'); }
function closeMBg(e) { if(e.target===$('modal-bg')) closeModal(); }

function addVE(lb, tw='', en='') {
  veN++;
  const n = document.querySelectorAll('.verse-editor').length;
  const label = lb==='Verse'?`Verse ${n+1}`:lb;
  const id = 've_'+veN;
  const d = document.createElement('div');
  d.className='verse-editor'; d.id=id;
  d.innerHTML=`<div class="ve-head">
    <input type="text" value="${label}"/>
    <button class="rm-v" onclick="document.getElementById('${id}').remove()">✕</button>
  </div>
  <div class="ve-cols">
    <div><div class="ve-lbl" style="color:var(--gold)">Twi</div><textarea placeholder="Twi text...">${tw}</textarea></div>
    <div><div class="ve-lbl" style="color:var(--blue)">English</div><textarea placeholder="English text...">${en}</textarea></div>
  </div>`;
  $('v-editors').appendChild(d);
}

function saveHymn() {
  const num=parseInt($('m-num').value);
  const tw=$('m-tw').value.trim();
  const en=$('m-en').value.trim();
  if(!num||!tw||!en){alert('Please fill in number and both titles.');return;}
  const verses=[];
  document.querySelectorAll('.verse-editor').forEach(div=>{
    const label=div.querySelector('input').value.trim();
    const [a,b]=div.querySelectorAll('textarea');
    if(a.value.trim()) verses.push({label,tw:a.value.trim(),en:b.value.trim()});
  });
  if(!verses.length){alert('Please add at least one verse.');return;}
  const h={num,tw,en,verses};
  if(editIdx!==null){ hymns[editIdx]=h; if(selectedHymn&&selectedHymn.num===num) selectedHymn=h; }
  else { if(hymns.find(x=>x.num===num)){alert(`Hymn ${num} already exists.`);return;} hymns.push(h); }
  hymns.sort((a,b)=>a.num-b.num);
  saveHymns(); closeModal();
  filter($('search').value);
  if(selectedHymn) renderPresenter();
}

function delHymn() {
  if(!selectedHymn||!confirm(`Delete "${selectedHymn.tw}"?`)) return;
  hymns=hymns.filter(h=>h.num!==selectedHymn.num);
  selectedHymn=null; verse=0;
  saveHymns();
  $('btn-edit').style.display='none'; $('btn-del').style.display='none';
  $('preview-grid').style.display='none'; $('preview-empty').style.display='flex';
  $('verse-strip').innerHTML=''; $('present-btn').disabled=true;
  $('pos-badge').style.display='none';
  T('info-tw','No hymn selected'); T('info-en','');
  $('btn-prev').disabled=true; $('btn-next').disabled=true;
  filter($('search').value);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
hymns = loadHymns();
hymns.sort((a,b)=>a.num-b.num);
filter('');
$('preview-grid').style.display='none';
$('present-btn').disabled=true;
$('pos-badge').style.display='none';
</script>
</body>
</html>
