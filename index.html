<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Church Hymnal Projector</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0e1117; --surface:#161b27; --surface2:#1c2333;
      --border:#232d42; --border2:#2d3a55;
      --text:#e8edf8; --text2:#8494b4; --text3:#4f6080;
      --gold:#e2b96a; --gold-dim:#a07a3a;
      --blue:#4a7fd4; --blue-dim:#2a4f8a;
      --green:#3dba78; --red:#e05555;
      --font-h:'Playfair Display',serif; --font-b:'Inter',sans-serif; --r:8px;
    }
    body { font-family:var(--font-b); background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    #header { height:50px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 18px; gap:12px; flex-shrink:0; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-icon { width:30px; height:30px; background:linear-gradient(135deg,var(--gold-dim),var(--gold)); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; }
    .brand-name { font-family:var(--font-h); font-size:15px; font-weight:700; color:var(--text); }
    .brand-sub { font-size:10px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; margin-top:1px; }
    #hdr-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .presenting-badge { display:none; align-items:center; gap:5px; background:rgba(61,186,120,0.12); border:1px solid rgba(61,186,120,0.3); color:var(--green); font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
    .presenting-badge.show { display:flex; }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.25} }
    .count-chip { font-size:11px; color:var(--text3); background:var(--surface2); padding:3px 9px; border-radius:20px; border:1px solid var(--border); }

    #app { display:flex; flex:1; overflow:hidden; }

    #sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
    .search-box { padding:10px; border-bottom:1px solid var(--border); }
    .search-box input { width:100%; padding:8px 11px; background:var(--bg); border:1px solid var(--border2); border-radius:var(--r); font-size:13px; font-family:var(--font-b); color:var(--text); outline:none; }
    .search-box input::placeholder { color:var(--text3); }
    .search-box input:focus { border-color:var(--blue); }
    #hymn-list { overflow-y:auto; flex:1; }
    .hymn-item { padding:9px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.1s; }
    .hymn-item:hover { background:var(--surface2); }
    .hymn-item.active { background:rgba(74,127,212,0.1); border-left:2px solid var(--gold); }
    .h-num { font-size:10px; font-weight:600; color:var(--text3); letter-spacing:0.04em; }
    .h-tw { font-size:12px; font-weight:600; color:var(--text); margin-top:1px; }
    .h-en { font-size:11px; color:var(--text2); margin-top:1px; }
    .sidebar-footer { padding:9px 10px; border-top:1px solid var(--border); display:flex; gap:6px; }
    .sb-btn { flex:1; padding:7px; border:1px solid var(--border2); border-radius:var(--r); background:transparent; color:var(--text2); font-size:12px; font-family:var(--font-b); cursor:pointer; transition:all 0.1s; }
    .sb-btn:hover { background:var(--surface2); color:var(--text); }
    .sb-btn.del { color:var(--red); border-color:rgba(224,85,85,0.25); }
    .sb-btn.del:hover { background:rgba(224,85,85,0.08); }

    #presenter { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }

    #preview-wrap { flex-shrink:0; margin:12px 12px 0; background:#060911; border-radius:10px; aspect-ratio:16/7; overflow:hidden; border:1px solid var(--border2); box-shadow:0 4px 20px rgba(0,0,0,0.4); display:flex; position:relative; }
    #preview-wrap::before,#preview-wrap::after { content:''; position:absolute; width:14px; height:14px; border-style:solid; border-color:var(--gold-dim); opacity:0.5; }
    #preview-wrap::before { top:6px; left:6px; border-width:1.5px 0 0 1.5px; }
    #preview-wrap::after { bottom:6px; right:6px; border-width:0 1.5px 1.5px 0; }
    #preview-grid { flex:1; display:none; grid-template-columns:1fr 1px 1fr; }
    .prev-sep { background:rgba(255,255,255,0.05); }
    .prev-pane { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 3%; text-align:center; }
    .prev-lang { text-transform:uppercase; letter-spacing:0.1em; font-weight:700; margin-bottom:5px; }
    .prev-lang.en { color:var(--blue); font-size:clamp(7px,1vw,10px); }
    .prev-lang.tw { color:var(--gold); font-size:clamp(7px,1vw,10px); }
    .prev-label { color:rgba(255,255,255,0.22); font-size:clamp(6px,0.7vw,9px); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
    #prev-en { color:#fff; font-family:var(--font-h); font-weight:700; font-size:clamp(9px,1.7vw,16px); line-height:1.4; white-space:pre-line; text-align:center; }
    #prev-tw { color:rgba(255,255,255,0.85); font-family:var(--font-h); font-weight:700; font-size:clamp(9px,1.7vw,16px); line-height:1.4; white-space:pre-line; text-align:center; }
    #preview-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; gap:8px; color:var(--text3); }
    #preview-empty .icon { font-size:28px; opacity:0.35; }
    #preview-empty p { font-size:13px; }

    #controls { display:flex; align-items:center; gap:10px; padding:10px 12px 6px; flex-shrink:0; }
    #hymn-info { flex:1; min-width:0; }
    #hymn-info h2 { font-family:var(--font-h); font-size:15px; font-weight:700; color:var(--gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #hymn-info p { font-size:11px; color:var(--text2); margin-top:1px; }
    .pos-badge { font-size:12px; font-weight:600; color:var(--text2); background:var(--surface2); padding:4px 10px; border-radius:20px; border:1px solid var(--border); white-space:nowrap; }
    .nav-btn { padding:9px 20px; border-radius:var(--r); font-size:14px; font-weight:600; font-family:var(--font-b); cursor:pointer; border:none; white-space:nowrap; transition:all 0.15s; }
    .nav-btn:disabled { opacity:0.2; cursor:default; }
    #btn-prev { background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:9px 18px; }
    #btn-prev:not(:disabled):hover { background:var(--border2); }
    #btn-next { background:var(--blue); color:#fff; padding:9px 24px; box-shadow:0 2px 10px rgba(74,127,212,0.3); }
    #btn-next:not(:disabled):hover { background:#5a8fe4; }

    #action-row { display:flex; align-items:center; gap:8px; padding:4px 12px 8px; flex-shrink:0; }
    .font-btn { padding:4px 10px; border:1px solid var(--border2); border-radius:6px; background:var(--surface2); color:var(--text2); cursor:pointer; font-size:13px; font-family:var(--font-b); transition:all 0.1s; }
    .font-btn:hover { background:var(--border2); color:var(--text); }
    #fs-val { font-size:12px; font-weight:600; min-width:24px; text-align:center; color:var(--text2); }
    #gap { flex:1; }
    #present-btn { padding:10px 26px; border-radius:var(--r); font-size:14px; font-weight:700; font-family:var(--font-b); cursor:pointer; border:none; background:var(--gold); color:#0e1117; box-shadow:0 2px 14px rgba(226,185,106,0.3); display:flex; align-items:center; gap:7px; transition:all 0.15s; }
    #present-btn:not(:disabled):hover { background:#ecc97a; transform:translateY(-1px); }
    #present-btn:disabled { opacity:0.3; cursor:default; transform:none; box-shadow:none; }
    #present-btn.active { background:var(--red); color:#fff; box-shadow:0 2px 14px rgba(224,85,85,0.35); }
    #present-btn.active:hover { background:#e86868; }

    #strip-wrap { flex:1; overflow-y:auto; padding:0 12px 12px; display:flex; flex-direction:column; gap:5px; }
    #strip-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:4px 0 2px; flex-shrink:0; }
    .v-thumb { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r); padding:9px 12px; cursor:pointer; flex-shrink:0; display:grid; grid-template-columns:56px 1fr 1fr; gap:0 10px; align-items:start; transition:all 0.1s; }
    .v-thumb:hover { background:var(--surface2); border-color:var(--border2); }
    .v-thumb.cur { border-color:var(--blue); background:rgba(74,127,212,0.08); }
    .v-thumb.live { border-color:var(--gold); background:rgba(226,185,106,0.06); }
    .vt-lbl { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.06em; padding-top:1px; }
    .v-thumb.live .vt-lbl { color:var(--gold); }
    .vt-en { font-size:11px; font-weight:600; color:var(--text); line-height:1.5; white-space:pre-line; }
    .vt-tw { font-size:11px; font-weight:600; color:var(--text); line-height:1.5; white-space:pre-line; }
    .air-tag { font-size:9px; font-weight:700; background:var(--gold); color:#0e1117; padding:1px 5px; border-radius:6px; margin-left:4px; }

    #pres-view { display:none; position:fixed; inset:0; z-index:9999; background:#060911; flex-direction:column; }
    #pres-view.show { display:flex; }
    #pres-topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,0.05); }
    #pres-meta { color:rgba(255,255,255,0.3); font-size:12px; }
    #pres-count { color:rgba(255,255,255,0.25); font-size:12px; }
    #pres-stop { font-size:12px; font-weight:600; font-family:var(--font-b); color:rgba(255,255,255,0.35); background:none; border:1px solid rgba(255,255,255,0.12); border-radius:6px; padding:5px 13px; cursor:pointer; transition:all 0.15s; }
    #pres-stop:hover { color:#fff; border-color:rgba(255,255,255,0.3); }
    #pres-stage { flex:1; display:grid; grid-template-columns:1fr 1px 1fr; overflow:hidden; }
    .pres-sep { background:rgba(255,255,255,0.05); }
    .pres-pane { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 6vw; text-align:center; }
    .pres-lang { letter-spacing:0.13em; text-transform:uppercase; font-weight:700; margin-bottom:20px; }
    #pres-lang-en { color:var(--blue); }
    #pres-lang-tw { color:var(--gold); }
    .pres-label { color:rgba(255,255,255,0.2); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:14px; }
    #pres-en { color:#fff; font-family:var(--font-h); font-weight:700; line-height:1.5; white-space:pre-line; text-align:center; }
    #pres-tw { color:#fff; font-family:var(--font-h); font-weight:700; line-height:1.5; white-space:pre-line; text-align:center; }
    #pres-nav { display:flex; align-items:center; justify-content:center; gap:12px; padding:14px; flex-shrink:0; border-top:1px solid rgba(255,255,255,0.05); }
    .pnav { padding:10px 32px; border-radius:var(--r); font-size:14px; font-weight:700; font-family:var(--font-b); cursor:pointer; border:none; transition:all 0.15s; }
    .pnav:disabled { opacity:0.18; cursor:default; }
    #pnav-prev { background:rgba(255,255,255,0.07); color:#fff; border:1px solid rgba(255,255,255,0.12); }
    #pnav-prev:not(:disabled):hover { background:rgba(255,255,255,0.13); }
    #pnav-next { background:var(--gold); color:#0e1117; box-shadow:0 2px 12px rgba(226,185,106,0.3); }
    #pnav-next:not(:disabled):hover { background:#ecc97a; }
    #pres-pos { color:rgba(255,255,255,0.25); font-size:13px; font-weight:600; min-width:60px; text-align:center; }

    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center; }
    .modal-bg.show { display:flex; }
    .modal-box { background:var(--surface2); border:1px solid var(--border2); border-radius:12px; padding:26px; width:620px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,0.5); }
    .modal-box h2 { font-family:var(--font-h); font-size:19px; font-weight:700; color:var(--gold); margin-bottom:16px; }
    .mf { margin-bottom:12px; }
    .mf label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
    .mf input,.mf textarea { width:100%; padding:9px 11px; border:1px solid var(--border2); border-radius:var(--r); font-size:13px; color:var(--text); background:var(--bg); font-family:var(--font-b); outline:none; transition:border-color 0.15s; }
    .mf textarea { min-height:68px; resize:vertical; }
    .mf input:focus,.mf textarea:focus { border-color:var(--blue); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
    .btn-cancel { padding:8px 16px; border:1px solid var(--border2); border-radius:var(--r); background:transparent; cursor:pointer; font-size:13px; font-family:var(--font-b); color:var(--text2); }
    .btn-cancel:hover { background:rgba(255,255,255,0.05); }
    .btn-ok { padding:8px 20px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:13px; font-weight:700; font-family:var(--font-b); cursor:pointer; }
    .btn-ok:hover { background:#5a8fe4; }
    .ve-cols { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .ve-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
    .verse-editor { border:1px solid var(--border2); border-radius:var(--r); padding:11px; margin-bottom:8px; }
    .ve-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .ve-head input { border:none; background:transparent; font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.07em; outline:none; width:130px; font-family:var(--font-b); }
    .rm-v { background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; line-height:1; }
    #add-v-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
    .avt { padding:5px 12px; border:1px dashed var(--border2); border-radius:6px; background:transparent; color:var(--text2); font-size:12px; font-family:var(--font-b); cursor:pointer; }
    .avt:hover { background:var(--surface2); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  </style>
</head>
<body>

<div id="pres-view">
  <div id="pres-topbar">
    <div id="pres-meta"></div>
    <div id="pres-count"></div>
    <button id="pres-stop" onclick="stopPresenting()">✕ Stop Presenting (Esc)</button>
  </div>
  <div id="pres-stage">
    <div class="pres-pane">
      <div class="pres-lang" id="pres-lang-en">English</div>
      <div class="pres-label" id="pres-lbl-en" style="font-size:clamp(10px,1vw,14px)"></div>
      <div id="pres-en"></div>
    </div>
    <div class="pres-sep"></div>
    <div class="pres-pane">
      <div class="pres-lang" id="pres-lang-tw">Twi</div>
      <div class="pres-label" id="pres-lbl-tw" style="font-size:clamp(10px,1vw,14px)"></div>
      <div id="pres-tw"></div>
    </div>
  </div>
  <div id="pres-nav">
    <button class="pnav" id="pnav-prev" onclick="go(-1)">← Prev</button>
    <span id="pres-pos"></span>
    <button class="pnav" id="pnav-next" onclick="go(1)">Next →</button>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeMBg(event)">
  <div class="modal-box">
    <h2 id="modal-title">Add New Hymn</h2>
    <div class="mf"><label>Hymn Number</label><input type="number" id="m-num" placeholder="e.g. 42"/></div>
    <div class="mf"><label>Title in Twi</label><input type="text" id="m-tw" placeholder="Twi title..."/></div>
    <div class="mf"><label>Title in English</label><input type="text" id="m-en" placeholder="English title..."/></div>
    <div class="mf">
      <label>Verses</label>
      <div id="v-editors"></div>
      <div id="add-v-row">
        <button class="avt" onclick="addVE('Verse')">+ Verse</button>
        <button class="avt" onclick="addVE('Chorus')">+ Chorus</button>
        <button class="avt" onclick="addVE('Bridge')">+ Bridge</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="saveHymn()">Save Hymn</button>
    </div>
  </div>
</div>

<div id="header">
  <div class="brand">
    <div class="brand-icon">✝</div>
    <div>
      <div class="brand-name">Hymnal Projector</div>
      <div class="brand-sub">Phoenix Ghanaian SDA</div>
    </div>
  </div>
  <div id="hdr-right">
    <div class="presenting-badge" id="pres-badge"><div class="badge-dot"></div>Presenting</div>
    <div class="count-chip" id="hymn-count">0 hymns</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search hymns..." oninput="filter(this.value)"/>
    </div>
    <div id="hymn-list"></div>
    <div class="sidebar-footer">
      <button class="sb-btn" onclick="openModal()">+ Add</button>
      <button class="sb-btn" id="btn-edit" style="display:none" onclick="openModal(selectedHymn&&selectedHymn.num)">Edit</button>
      <button class="sb-btn del" id="btn-del" style="display:none" onclick="delHymn()">Delete</button>
    </div>
  </div>

  <div id="presenter">
    <div id="preview-wrap">
      <div id="preview-grid">
        <div class="prev-pane">
          <div class="prev-lang en">English</div>
          <div class="prev-label" id="pv-lbl-en"></div>
          <div id="prev-en"></div>
        </div>
        <div class="prev-sep"></div>
        <div class="prev-pane">
          <div class="prev-lang tw">Twi</div>
          <div class="prev-label" id="pv-lbl-tw"></div>
          <div id="prev-tw"></div>
        </div>
      </div>
      <div id="preview-empty">
        <div class="icon">♪</div>
        <p>Select a hymn to begin</p>
      </div>
    </div>

    <div id="controls">
      <div id="hymn-info">
        <h2 id="info-tw">No hymn selected</h2>
        <p id="info-en"></p>
      </div>
      <span class="pos-badge" id="pos-badge" style="display:none"></span>
      <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Prev</button>
      <button class="nav-btn" id="btn-next" onclick="go(1)" disabled>Next →</button>
    </div>

    <div id="action-row">
      <span style="font-size:12px;color:var(--text3)">Font:</span>
      <button class="font-btn" onclick="chFont(-2)">A−</button>
      <span id="fs-val">32</span>
      <button class="font-btn" onclick="chFont(2)">A+</button>
      <div id="gap"></div>
      <button id="present-btn" onclick="togglePresent()" disabled>▶ Present</button>
    </div>

    <div id="strip-wrap">
      <div id="strip-label">All Verses — click any to jump</div>
      <div id="verse-strip"></div>
    </div>
  </div>
</div>

<script>
const HYMNS_KEY = 'church_hymns_v5';

// ═══════════════════════════════════════════════════════════
// ALL 50 HYMNS from Kristofo Nnwom (Twi) + English Hymnal
// ═══════════════════════════════════════════════════════════
const BUILTIN_HYMNS = [
  {
    num: "1A", tw: "Yɛne Nyame Nante", en: "Trust and Obey",
    verses: [
      { label: "Verse 1",
        tw: "Yɛne Nyame nante,\nWo n'asɛm no han mu a,\nAnuonyam bia ohwie gu yɛn kwan mu.\nSɛ yɛ yɛ ne pɛ de a,\nOne yɛ te ho daa,\nNe obiara ogyedi na otie.",
        en: "When we walk with the Lord,\nIn the light of His word,\nWhat a glory He sheds on our way!\nWhile we do His good will,\nHe abides with us still,\nAnd with all who will trust and obey." },
      { label: "Chorus",
        tw: "Gyidi na tie,\nOkwan biara nni hɔ a,\nYenya Iesu mu ahoto,\nGyesɛ w'gyidi na w'tie.",
        en: "Trust and obey,\nFor there's no other way,\nTo be happy in Jesus,\nBut to trust and obey." }
    ]
  },
  {
    num: "1B", tw: "Gye Me Bra, Me Wura Na Ma", en: "Take My Life and Let It Be",
    verses: [
      { label: "Verse 1",
        tw: "Gye me bra, me Wura, na ma,\nMemfa nhyɛ wonsa koraa,\nGye me mmɛrɛ ne mennafua,\nNa memfa nyi wo ayɛ daa.",
        en: "Take my life and let it be,\nConsecrated, Lord, to Thee;\nTake my moments and my days,\nLet them flow in ceaseless praise." },
      { label: "Verse 2",
        tw: "Gye me pɛ, fa yɛ wo de,\nErenyɛ me daa ara bio.\nGye me koma, Wo dea ampa,\nMeyɛ Wo nko, Wo dea daa.",
        en: "Take my will and make it Thine,\nIt shall be no longer mine;\nTake my heart, it is Thine own,\nIt shall be Thy royal throne." },
      { label: "Verse 3",
        tw: "Gye me dɔ, m'Awurade,\nMehwie gu Wo nan ase.\nGye me ne m'ade nyinaa,\nMeyɛ Wo nko, Wo dea daa.",
        en: "Take my love, my Lord, I pour,\nAt Thy feet its treasure store;\nTake myself and I will be,\nEver, only, all for Thee." }
    ]
  },
  {
    num: 2, tw: "Ahotoso Pa, Manya Yesu", en: "Blessed Assurance",
    verses: [
      { label: "Verse 1",
        tw: "Ahotoso pa, manya Yesu,\nO! dɛn anuonyam na meka hwɛ!\nNyame ato me, nkwagye-difoo;\nHonhom awo me, woadware me.",
        en: "Blessed assurance, Jesus is mine!\nO what a foretaste of glory divine!\nHeir of salvation, purchase of God,\nBorn of His Spirit, washed in His blood." },
      { label: "Chorus",
        tw: "M'asɛm, ɛne sɛ, me nnwom ne sɛ:\nDaa nyinaa meyi M'agyenkwa, ayɛ.",
        en: "This is my story, this is my song,\nPraising my Saviour all the day long." },
      { label: "Verse 2",
        tw: "Ahobrɛasɛɛ kronn, Anigyeɛ Kronn,\nAhosɛpɛ pue m'ani so hauu;\nAbofoo sian fi soro bɛka,\nAhoummobo ne dɔ hu asɛm.",
        en: "Perfect submission, perfect delight,\nVisions of rapture now burst on my sight;\nAngels descending bring from above,\nEchoes of mercy, whispers of love." },
      { label: "Verse 3",
        tw: "Ahobrɛasɛɛ Kronn, ne nyinaa adwo,\nMedi dɛ nya nhyira, M'agyenkwa mu,\nMerewɛa, retwɛn, m'ani tua soro,\nMete Ne dɔ mu, N'adoɛ mɔɛ me.",
        en: "Perfect submission, all is at rest,\nI in my Saviour am happy and blest;\nWatching and waiting, looking above,\nFilled with His goodness, lost in His love." }
    ]
  },
  {
    num: 3, tw: "Mete Wo Nne Dɛdɛ A", en: "I Am Coming, Lord",
    verses: [
      { label: "Verse 1",
        tw: "Mete wo nne dɛdɛ a,\nɛfrɛ me, Awurade,\nSɛ mennware mogya no a,\nWɔhwiee wɔ Kalvary.",
        en: "I am coming to the cross,\nI am poor, and weak, and blind;\nI am counting all but dross,\nI shall full salvation find." },
      { label: "Chorus",
        tw: "Awurade, meba!\nMeba Wo nkyɛn nnɛ;\nTɛ me ho mogyano mu,\nWɔhwiee Wɔ Kalvary.",
        en: "I am trusting, Lord, in Thee,\nBlessèd Lamb of Calvary;\nHumbly at Thy cross I bow,\nSave me, Jesus, save me now." },
      { label: "Verse 2",
        tw: "Sɛ meba mmɛrɛ mu a,\nWoara Wohyɛ me den.\nSɛ mede ne ho bone baa,\nWote me ho koraa.",
        en: "Long my heart has sighed for Thee,\nLong has evil reigned within;\nJesus sweetly speaks to me,\n'I will cleanse you from all sin.'" },
      { label: "Verse 3",
        tw: "Yesu na Ofrɛ me,\nDe gyidie, asomdwoe,\nAnidasuo, dɔ si m'anim,\nWo ha ne Ɛsoro.",
        en: "Here I give my all to Thee,\nFriends and time and earthly store;\nSoul and body Thine to be,\nWholly Thine for evermore." }
    ]
  },
  {
    num: 4, tw: "Yɔnko Bɛn N'Ɔte Sɛ Yesu", en: "What a Friend We Have in Jesus",
    verses: [
      { label: "Verse 1",
        tw: "Yɔnko bɛn n'ɔte sɛ Yesu,\nƆasoa yɛn bɔne ne yea;\nɛyɛ sɛ yede ade nyinaa,\nKo Nyame hɔ mpaebɔm!\nAo! yɛtaa sɛe asomdwoe kwa:\nAo! yɛde yea a ɛnhia,\nɛfisɛ yɛmfa ade nyinna,\nNnko Nyame ho mpaebom.",
        en: "What a friend we have in Jesus,\nAll our sins and griefs to bear!\nWhat a privilege to carry,\nEverything to God in prayer!\nO what peace we often forfeit,\nO what needless pain we bear,\nAll because we do not carry,\nEverything to God in prayer." },
      { label: "Verse 2",
        tw: "Sɔ yɛ wɔ nnyigyeɛ ne sɔhwɛ,\nƆhaw bi wɔ ho ana?\nYɛrempa aba ara da:\nFa kɔ Nyame hɔ mpaebom;\nYɛwɔ yɔnko nokwafoo bi a,\nƆbɛgyam yɛn yɛa mu:\nJesu nim yɛn mmɛrɛyɛ nyinaa,\nFa ko Nyame ho mpaebom!",
        en: "Have we trials and temptations?\nIs there trouble anywhere?\nWe should never be discouraged,\nTake it to the Lord in prayer.\nCan we find a friend so faithful,\nWho will all our sorrows share?\nJesus knows our every weakness,\nTake it to the Lord in prayer." },
      { label: "Verse 3",
        tw: "Yɛ-ayɛ mmɛrɛ na yɛn kɔn abu!\nDadwen ne haw gu yɛn so?\nAgyɛnkwa ne yɛn guankɔbea,\nFakɔ Nyame hɔ mpaɛbom!\nNe nsam bɛyɛ kokyɛm amaw'\nWɔ benya abo toyam'.",
        en: "Are we weak and heavy laden,\nCumbered with a load of care?\nPrecious Saviour, still our refuge,\nTake it to the Lord in prayer.\nDo thy friends despise, forsake thee?\nTake it to the Lord in prayer;\nIn His arms He'll take and shield thee,\nThou wilt find a solace there." }
    ]
  },
  {
    num: 5, tw: "Monsɔre Nnyina Mma Jesu", en: "Stand Up, Stand Up for Jesus",
    verses: [
      { label: "Verse 1",
        tw: "Monsɔre nnyinaa mma Iesu,\nAsɛnnua hɔ nsraafoo,\nMomma ne frankaa no so,\nɛnsɛ sɛ ɛyera:\nFi nim mu hɔ nkonim mu,\nMe-di me dɔm anim,\nKosi sɛ tamfu agu,\nNa Kristo ne wura.",
        en: "Stand up, stand up for Jesus,\nYe soldiers of the cross;\nLift high His royal banner,\nIt must not suffer loss.\nFrom victory unto victory,\nHis army shall He lead,\nTill every foe is vanquished,\nAnd Christ is Lord indeed." },
      { label: "Verse 2",
        tw: "Monsɔre nnyina mma Iesu,\nMunnyina N'ahoɔden mu,\nHonam bɛdi mu huanmɔ,\nMonntwere mo ankasa,\nMonhyɛ Kristo akodɛ,\nMonwɛn Wɔ mpaɛbɔm':\nƆsom mu o, amane mu o,\nMonnan moakyi nnkyerɛ da.",
        en: "Stand up, stand up for Jesus,\nStand in His strength alone;\nThe arm of flesh will fail you,\nYe dare not trust your own.\nPut on the gospel armour,\nEach piece put on with prayer;\nWhere duty calls or danger,\nBe never wanting there." },
      { label: "Verse 3",
        tw: "Monsɔre nnyina mma Iesu,\nƆko no renkye pii,\nɛnnɛ Ɔko gyegyeegye.\nƆkyena nkonim dwom,\nNea obedi nkonim nɔ,\nBenya nkwa abotire.\nNea one nuonyam Rene no,\nBedi hene daa daa.",
        en: "Stand up, stand up for Jesus,\nThe strife will not be long;\nThis day the noise of battle,\nThe next the victor's song.\nTo him that overcometh,\nA crown of life shall be;\nHe with the King of Glory,\nShall reign eternally." }
    ]
  },
  {
    num: 6, tw: "Tete Bo A Wɔpae Maa Me", en: "Rock of Ages",
    verses: [
      { label: "Verse 1",
        tw: "Tete Bo a wɔpae maa me;\nMa menguan nhunta Wo mu,\nMa asuo ne mogya no a,\nEfi Wo mfɛm resen no,\nɛnyɛ bone ho aduro,\nɛmpa memfom nsan me ho.",
        en: "Rock of Ages, cleft for me,\nLet me hide myself in Thee;\nLet the water and the blood,\nFrom Thy wounded side which flowed,\nBe of sin the double cure,\nSave from wrath and make me pure." },
      { label: "Verse 2",
        tw: "Sɛ me nisuo sɛn daa po,\nNa me mmodɛn ngo da pɔ,\nEntumi bɔne ka tua;\nGyefoo ne Wo ara nko,\nMe nsam nni akatua bi,\nMekuta W'asɛnnua mu.",
        en: "Not the labour of my hands,\nCan fulfil Thy law's demands;\nCould my zeal no respite know,\nCould my tears for ever flow,\nAll for sin could not atone,\nThou must save, and Thou alone." },
      { label: "Verse 3",
        tw: "Megu ahometia yi,\nMeka m'ani gu so a,\nMesɔre ba noho a,\nBehu Wo W'ahɛnnwa sɔ a,\nTete Bo a wɔpae maa me,\nMa menguan nhunta Wo mu.",
        en: "While I draw this fleeting breath,\nWhen mine eyes shall close in death,\nWhen I soar to worlds unknown,\nSee Thee on Thy judgement throne,\nRock of Ages, cleft for me,\nLet me hide myself in Thee." }
    ]
  },
  {
    num: 7, tw: "Me Gyedie Tim Wo So", en: "My Faith Looks Up to Thee",
    verses: [
      { label: "Verse 1",
        tw: "Me gyedie tim Wo so.\nO! Kalvary Adwamma,\nGyefoo Kronkron,\nTie mpae a mebo yi,\nYi me ho bone nyinaa,\nNa efi nne menyɛ,\nWo de koraa.",
        en: "My faith looks up to Thee,\nThou Lamb of Calvary,\nSaviour divine!\nNow hear me while I pray,\nTake all my guilt away,\nO let me from this day\nBe wholly Thine!" },
      { label: "Verse 2",
        tw: "Ma Wo dom Kɛseɛ no,\nNhyɛ me koma den,\nNa menye nnam;\nSɛ wo wui maa me no,\nAo! ma me nso ɔdɔ,\nNnɛ dɛn-nan mma Wo,\nNa moand a.",
        en: "May Thy rich grace impart,\nStrength to my fainting heart,\nMy zeal inspire;\nAs Thou hast died for me,\nO may my love to Thee,\nPure, warm and changeless be,\nA living fire!" },
      { label: "Verse 3",
        tw: "Menam bra sum mu yi,\nYea atwa me hɔ yi,\nKyerɛ me kwan,\nMa sum nnan adekyee,\nNa popa me nnusuo,\nNa mma menyera,\nMfiri Wo nkyɛn.",
        en: "While life's dark maze I tread,\nAnd griefs around me spread,\nBe Thou my guide;\nBid darkness turn to day,\nWipe sorrow's tears away,\nNor let me ever stray\nFrom Thee aside." },
      { label: "Verse 4",
        tw: "Sɛ ɔbra yi twa mu,\nNa owuo asuten,\nBeworo me so a,\nM'Agyenkwa Dɛɛfoo pa,\nYime suro nɛ akyinnye,\nFame kra a Woagye nɔn!\nKo soro fie sonn.",
        en: "When ends life's transient dream,\nWhen death's cold, sullen stream\nShall o'er me roll;\nBlest Saviour, then in love,\nFear and distrust remove,\nO bear me safe above,\nA ransomed soul!" }
    ]
  },
  {
    num: 8, tw: "Bura Bi Wɔ Hɔ Mogya Ma", en: "There Is a Fountain",
    verses: [
      { label: "Verse 1",
        tw: "Bura bi wɔ hɔ mogya ma,\nWɔhuee Immanuel mfɛm,\nNa nneboneyefoo to imu a,\nWon afodie yera.",
        en: "There is a fountain filled with blood,\nDrawn from Emmanuel's veins;\nAnd sinners plunged beneath that flood,\nLose all their guilty stains." },
      { label: "Verse 2",
        tw: "Wo mogya tumi rempa da,\nNyankopɔn Adwamma,\nGye sɛ Wo mma nyinaa nya nkwa,\nNa wonyɛ bone bio.",
        en: "The dying thief rejoiced to see,\nThat fountain in his day;\nAnd there have I, though vile as he,\nWashed all my sins away." },
      { label: "Verse 3",
        tw: "Efi sɛ mede gyidie huu,\nMogya a efi Wo mfɛm,\nOnyame dɔ ayɛ dwom,\nɛbeyɛ ako wum.",
        en: "E'er since by faith I saw the stream,\nThy flowing wounds supply,\nRedeeming love has been my theme,\nAnd shall be till I die." }
    ]
  },
  {
    num: 9, tw: "Oman Bi Wɔ Hɔ Ehyerɛn Sen Wi", en: "There's a Land That Is Fairer Than Day",
    verses: [
      { label: "Verse 1",
        tw: "Oman bi wɔ hɔ Ehyerɛn sen wi,\nYɛde gyedie hu wɔ akyiri,\nNa Agya retwen wɔ kwan so,\nAiesie tɛnabea ama yɛn hɔ.",
        en: "There's a land that is fairer than day,\nAnd by faith we can see it afar;\nFor the Father waits over the way,\nTo prepare us a dwelling place there." },
      { label: "Chorus",
        tw: "Daakye Bi... Anigyeɛm,\nYɛbɛhyia wɔ mpoano fɛfɛ hɔ;\nDaakye bi... Anigyeɛm,\nYɛbɛhyia wɔ mpoano fɛfɛ hɔ.",
        en: "In the sweet by and by,\nWe shall meet on that beautiful shore;\nIn the sweet by and by,\nWe shall meet on that beautiful shore." },
      { label: "Verse 2",
        tw: "Yɛbɛto wɔ mpoano fɛfɛ hɔ,\nNhyirafoo nnwom a ɛyɛ dɛ no,\nYɛn honhom renni yea ara da,\nYɛnsi apini yɛn home mu.",
        en: "We shall sing on that beautiful shore,\nThe melodious songs of the blest;\nAnd our spirits shall sorrow no more,\nNot a sigh for the blessing of rest." },
      { label: "Verse 3",
        tw: "Yɛn Soro Agya Ɔdɛɛfoo no,\nYɛde yɛn ayɛyie bɛma no,\nWo nhyira a Ɔde dom yɛn ha,\nNe Ne dɔ akyɛdɛɛ fafɛ nti.",
        en: "To our bountiful Father above,\nWe will offer our tribute of praise,\nFor the glorious gift of His love,\nAnd the blessings that hallow our days." }
    ]
  },
  {
    num: 10, tw: "Sɛ Medwɛn Asɛnnua Nwanwa A", en: "When I Survey the Wondrous Cross",
    verses: [
      { label: "Verse 1",
        tw: "Sɛ medwɛn Asɛnnua nwanwa a,\nNuonyam Hene wuu so no hɔ a,\nMɛmmu m'adepa biara hwɛɛ,\nNa m'ahomaso yɛ me tan.",
        en: "When I survey the wondrous cross,\nOn which the Prince of glory died,\nMy richest gain I count but loss,\nAnd pour contempt on all my pride." },
      { label: "Verse 2",
        tw: "Awurade, mma m'annhoran,\nGye sɛ Kristo me Nyame wum,\nNnɛɛma hunu a medɔ no,\nMede bo afodɛɛ Ne mogya.",
        en: "Forbid it, Lord, that I should boast,\nSave in the death of Christ my God!\nAll the vain things that charm me most,\nI sacrifice them to His blood." },
      { label: "Verse 3",
        tw: "Hwɛ sɛ yea ne ɔdɔ rɛsɛn,\nNe ti, Ne nsa, Ne ne nan hɔ,\nSɛɛ dɔ ne yea yi mmɔ mu pɛn.\nNa nsɔɛ kyɛ yi wonsoaa bi da.",
        en: "See from His head, His hands, His feet,\nSorrow and love flow mingled down!\nDid e'er such love and sorrow meet,\nOr thorns compose so rich a crown?" },
      { label: "Verse 4",
        tw: "Wiase nyinaa yɛ me de pɔ a,\nAnka ɛyɛ akyɛdɛɛ a ɛsua,\nAnwanwa dɔ Nyame dɔ yi,\nGye kra, n'kwa, ade nyinaa.",
        en: "Were the whole realm of nature mine,\nThat were a present far too small;\nLove so amazing, so divine,\nDemands my soul, my life, my all." }
    ]
  },
  {
    num: 11, tw: "Kristo Asraafoo", en: "Onward, Christian Soldiers",
    verses: [
      { label: "Verse 1",
        tw: "Kristofoo Asraafoo,\nMonnuom Akonɔ,\nYesu asɛnnua no,\nDi yɛn anim kan,\nYɛn Hene atu sa.\nRekɔ-tia tamfoo,\nMonnuom sraban nɔ so,\nMonhwɛ Ne frankaa.",
        en: "Onward, Christian soldiers,\nMarching as to war,\nWith the cross of Jesus\nGoing on before.\nChrist, the royal Master,\nLeads against the foe;\nForward into battle,\nSee His banners go!" },
      { label: "Chorus",
        tw: "Kristofoo asraafoo,\nMonnuom Akono,\nYesu asɛnnua no,\nDi yɛn anim kan.",
        en: "Onward, Christian soldiers,\nMarching as to war,\nWith the cross of Jesus\nGoing on before." },
      { label: "Verse 2",
        tw: "Yɛma Ne frankaa so a,\nƆbonsam dɔm gu,\nEnneɛ Kristo akofoo,\nMonkodi nkonim,\nYɛbɔ se yi ayɛ a,\nSaman fapɛm him,\nAnuanom monto nnwom.\nMommua mo nne so.",
        en: "At the sign of triumph\nSatan's host doth flee;\nOn then, Christian soldiers,\nOn to victory!\nHell's foundations quiver\nAt the shout of praise;\nBrothers, lift your voices,\nLoud your anthems raise." },
      { label: "Verse 3",
        tw: "Ahɛnnwa bɛtutu,\nAhɛnnie atwam,\nYesu asɔre de.\nɛbɛtim ho daa,\nAsamanapon nɔ,\nRentumi nhyɛ so.\nYɛwɔ Kristo bɔhyɛ,\nN'asɛm Iɛtwam da.",
        en: "Crowns and thrones may perish,\nKingdoms rise and wane,\nBut the Church of Jesus\nConstant will remain;\nGates of hell can never\n'Gainst that Church prevail;\nWe have Christ's own promise,\nAnd that cannot fail." },
      { label: "Verse 4",
        tw: "Me nkurɔfoo mommɛdom,\nAnigyeɛ kuo yi,\nMommura na yɛmmom nto,\nYɛn nkunim dwom yi,\nAnuonyam ne nkamfo,\nNka yɛn Hene no,\nNnipa ne abofoo,\nBɛto dwom yi daa.",
        en: "Onward then, ye people,\nJoin our happy throng,\nBlend with ours your voices\nIn the triumph song;\nGlory, laud, and honour,\nUnto Christ the King,\nThis through countless ages\nMen and angels sing." }
    ]
  },
  {
    num: 12, tw: "Anigyeɛ Da, ɛne Da No A", en: "Happy Day",
    verses: [
      { label: "Verse 1",
        tw: "Anigyeɛ da me da no a,\nMede me ho maa m'Agyɛnkwa;\nɛsɛ sɛ me koma di dɛ,\nNa ɔka ne dɛ kyerɛ aman.",
        en: "O happy day that fixed my choice\nOn Thee, my Saviour and my God!\nWell may this glowing heart rejoice,\nAnd tell its raptures all abroad." },
      { label: "Chorus",
        tw: "Anigyeɛ Da; AnigyeɛDa;\nDa a Yesu horo me ho bone,\nƆkyerɛɛ me sɛ mɛnwɛn mmɔ mpae,\nNa menni dɛ berɛ nyinaa,\nAnigyeɛ Da AnigyeɛDa,\nDa a, Yesu horome ho bɔne.",
        en: "Happy day, happy day,\nWhen Jesus washed my sins away!\nHe taught me how to watch and pray,\nAnd live rejoicing every day;\nHappy day, happy day,\nWhen Jesus washed my sins away!" },
      { label: "Verse 2",
        tw: "O nhyira nhyehyree; ɛso nse a,\nMedi kyerɛɛ me Dofoo ano;\nBerɛ a meba N'Asorefie,\nMomma ayeyie nnwom nhyɛ hɔ ma.",
        en: "'Tis done, the great transaction's done,\nI am my Lord's and He is mine;\nHe drew me and I followed on,\nCharmed to confess the voice divine." },
      { label: "Verse 3",
        tw: "Apam kɛseɛ no yɛawie pam;\nMeyɛ 'Ne di, Ɔyɛ me de,\nƆtwetwee me, medii N'akyi,\nNe Nyame nne no yɛ me dɛ.",
        en: "Now rest, my long-divided heart,\nFixed on this blissful centre, rest;\nNor ever from thy Lord depart,\nWith Him of every good possessed." }
    ]
  },
  {
    num: 13, tw: "Memfɛre M'Awurade Ho", en: "At the Cross",
    verses: [
      { label: "Verse 1",
        tw: "Memfɛre m'Awurade ho,\nSɛ mɛko ama no.\nMɛsɔ N'asɛm no nidie mu,\nN'asɛnnua ho nuɔnyam.",
        en: "Alas! and did my Saviour bleed,\nAnd did my Sovereign die?\nWould He devote that sacred head\nFor sinners such as I?" },
      { label: "Chorus",
        tw: "Asɛnnuam, Asɛnnuam, na medii kan huu hann,\nNa me koma adesoa pire firi ho,\nHɔ na mɛnam gyidie so huu adɛ.\nNa afei m'ahome ka me ho daa.",
        en: "At the cross, at the cross where I first saw the light,\nAnd the burden of my heart rolled away,\nIt was there by faith I received my sight,\nAnd now I am happy all the day!" },
      { label: "Verse 2",
        tw: "Yesu, me Nyame; Menim No,\nNe din na metwerɛ;\nƆremma me kra mfirɛ da,\nNa m'adidaso mpa.",
        en: "Was it for crimes that I had done\nHe groaned upon the tree?\nAmazing pity, grace unknown,\nAnd love beyond degree!" },
      { label: "Verse 3",
        tw: "N'asɛm tim hɔ sɛ Nahɛnnwa,\nƆbetumi asie.\nDɛɛ mede a hyɛ N'erisa no,\nAkodu awiei wo.",
        en: "Well might the sun in darkness hide\nAnd shut his glories in,\nWhen Christ, the mighty Maker, died\nFor man the creature's sin." },
      { label: "Verse 4",
        tw: "Ɔbɛhɔ wu N'Agya anim hɔ,\nMe din a ɛnsɛ yi,\nNa Jerusalem foforo mu,\nƆama mɛ kra tenabea.",
        en: "Thus might I hide my blushing face\nWhile His dear cross appears,\nDissolve my heart in thankfulness,\nAnd melt my eyes to tears." }
    ]
  },
  {
    num: 14, tw: "Ao Bra Ma Yɛnni Dɛ", en: "Come, Let Us Rejoice",
    verses: [
      { label: "Verse 1",
        tw: "Ao bra ma yɛnni dɛ,\nSɛ ka n meyɛ hiani a,\nAfei manya Nyame ho dɔ,\nDɔ a ɛkyɛn sika.",
        en: "Come, let us rejoice in the Lord,\nFor Jesus has made us His own;\nHis grace has redeemed us through blood,\nAnd He gives us a mansion of stone." },
      { label: "Verse 2",
        tw: "Ao, bra ma yɛnni dɛ,\nSɛ kan mɛtɔɔ baha a,\nAfei manya Otumfoo a,\nN'abasa wɛn me daa.",
        en: "Come, let us rejoice in the Lord,\nFor once I was lost and undone;\nBut Jesus has sought me and found me,\nAnd now I'm His very own son." },
      { label: "Verse 3",
        tw: "Ao, bra ma yɛnni dɛ,\nSɛ kan mɛbɔɔ ko a,\nNyame de Ne dɔ atwɛ me,\nSɛ mɛmmra m'Agya fie.",
        en: "Come, let us rejoice in the Lord,\nFor long I was wandering far;\nBut God in His infinite mercy,\nHas guided me home by His star." },
      { label: "Verse 4",
        tw: "Ao bra ma yɛnni dɛ,\nMe kra reyɛra no,\nM'Agyɛnkwa Yesu twee me fii,\nBone ne bɔnsam nsam.",
        en: "Come, let us rejoice in the Lord,\nFor once I was bound down in sin;\nBut Jesus has broken my fetters,\nAnd given me peace within." }
    ]
  },
  {
    num: 15, tw: "Yesu Kristo Resen Ha", en: "Jesus Is Passing By",
    verses: [
      { label: "Verse 1",
        tw: "Yesu Kristo resen ha,\nBoneyeni to W'ani hwɛ,\nBerɛ pa nu retwam yi,\nKekam sɛ, Hu me mmobɔ.",
        en: "Jesus is passing by, passing by,\nSinner, look up to Him now;\nIf thou wouldst be saved today,\nSinner, look up to Him now." },
      { label: "Verse 2",
        tw: "Yesu Kristo resen ha,\nSo Ɔbɛbɛn wo sɛɛ daa?\nɛnnɛ ne ɔgye-da no,\nHwehwɛ nkwa na wobenya.",
        en: "Jesus is passing by, passing by,\nHe calls thee to come unto Him;\nHe waits to save thee today,\nSinner, come unto Him." },
      { label: "Verse 3",

    verses: [
      { label: "Verse 1",
        tw: "Ɔdaa adamoa n'mu,\nYesu m'agyɛnkwa;\nƆrɛtwɛn adɛkyɛɛ n'\nMe Wura Yesu.",
        en: "Low in the grave He lay,\nJesus my Saviour!\nWaiting the coming day,\nJesus my Lord!" },
      { label: "Chorus",
        tw: "Ɔsoree puiei fii Ne dam,\nNe tumi kaa N'atamfoo hyeɛ,\nYesu dii owu n'aheman so konim,\nƆtwe nkwam Odi makoma so hene daa nyinaa,\nƆsoree, Ɔsoree, Halleluia Kristo soree.",
        en: "Up from the grave He arose,\nWith a mighty triumph o'er His foes;\nHe arose a Victor from the dark domain,\nAnd He lives forever with His saints to reign!\nHe arose! He arose! Hallelujah! Christ arose!" },
      { label: "Verse 2",
        tw: "Wɔwɛn Ne dabrɛ kwa,\nYesu m'Agyɛnkwa,\nWoantumi ansi N'kwan,\nMe Wura Yesu.",
        en: "Vainly they watched His bed,\nJesus my Saviour!\nVainly they sealed the dead,\nJesus my Lord!" },
      { label: "Verse 3",
        tw: "Owu bɛrɛ atu,\nYesu m'Agyɛnkwa,\nƆdwirii nnadɛɛ ban n'\nMe Wura Yesu.",
        en: "Death cannot keep his prey,\nJesus my Saviour!\nHe tore the bars away,\nJesus my Lord!" }
    ]
  },
  {
    num: 30, tw: "Sɛdɛɛ Yesu Din Si Yɛ Dɛ", en: "How Sweet the Name of Jesus Sounds",
    verses: [
      { label: "Verse 1",
        tw: "Sɛdɛɛ Yesu din si yɛ dɛ,\nWo gyedi ne som,\nɛtu ne yea sane yare,\nɛtu ne suro nyinaa.",
        en: "How sweet the name of Jesus sounds\nIn a believer's ear!\nIt soothes his sorrows, heals his wounds,\nAnd drives away his fear." },
      { label: "Verse 2",
        tw: "ɛbɔ Honhom pirafoo asu.\nɛdwɔ koma woabrɛ,\nAduane ma honhom ɔkom sw n'\nAhongye ma bɛrɛfoo.",
        en: "It makes the wounded spirit whole,\nAnd calms the troubled breast;\n'Tis manna to the hungry soul,\nAnd to the weary, rest." },
      { label: "Verse 3",
        tw: "Me mmɔdɛnmmɔ ayɛ mmɛrɛ,\nM'akoma yɛ awɔwawɔw,\nNa bɛrɛ a mehu sɛdɛɛ Wotɛɛ,\nM'eyi wo'ayɛ sɛ dɛɛ ɛsɛ.",
        en: "Dear Name, the rock on which I build,\nMy shield and hiding place,\nMy never-failing treasury, filled\nWith boundless stores of grace." },
      { label: "Verse 4",
        tw: "Kyerɛ da'n na maka dɔ no,\nMede nkwahwea biara,\nMa Wodin nnwom a ɛyɛ dɛ,\nƆlome me kra wo wuom.",
        en: "Jesus! My Shepherd, Husband, Friend,\nMy Prophet, Priest, and King,\nMy Lord, my Life, my Way, my End,\nAccept the praise I bring." }
    ]
  },
  {
    num: 31, tw: "Oyi Ne Nyame", en: "This Is God We Worship",
    verses: [
      { label: "Verse 1",

        en: "This is God whom we worship,\nOur faithful Friend who never fails;\nHis love is great as His power,\nHis mercy knows no end." },
      { label: "Verse 2",
        tw: "Yesu Mfiase ne awiei,\nNe Honhom de yɛ bɛdu fie,\nYɛyi No ayɛ dɛɛ atwam ho,\nYɛdan No dɛɛ ɛreba ho.",
        en: "Jesus, the first and the last,\nHis Spirit will lead us home;\nWe praise Him for what He has done,\nAnd trust Him for what's to come." }
    ]
  },
  {
    num: 32, tw: "O' Medɔ Me Yesu", en: "O, I Love My Jesus",

      { label: "Verse 1", tw: "O' medɔ me Yesu,\nƆno Ɔdoɔ me kan.", en: "O, I love my Jesus,\nHe first loved me." },

      { label: "Verse 4", tw: "Hyira Wura kora me,\nMetwere Wo nkutoo.", en: "Bless the Lord who keeps me,\nI trust in Thee alone." },
      { label: "Verse 5", tw: "Ao Yesu mɛdɔ Wo,\nMɛdɔ Wo ako wum.", en: "O Jesus, I love Thee,\nI'll love Thee till I die." },

  {
    num: 33, tw: "Makoma Mu", en: "Into My Heart",
    verses: [
      { label: "Verse 1",
        tw: "Makoma mu, Makoma mu,\nBra makoma mu Owura Yesu,\nBra mu ɛnnɛ, Bra bɛtra mu.\nBra makoma mu Owura Yesu.",
        en: "Into my heart, into my heart,\nCome into my heart, Lord Jesus;\nCome in today, come in to stay,\nCome into my heart, Lord Jesus." }
    ]
  },
  {
    num: 34, tw: "Anka Me Nya Tɛkyerɛma", en: "O for a Thousand Tongues to Sing",
    verses: [
      { label: "Verse 1",
        tw: "Anka me nya tɛkyerɛma mpɛm,\nMayi me Gyefoo ayɛ,\nMakamfo me Hene anuonyam,\nN'adom ne Nkonimdie.",
        en: "O for a thousand tongues to sing\nMy great Redeemer's praise!\nThe glories of my God and King,\nThe triumphs of His grace!" },
      { label: "Verse 2",
        tw: "Me Wura Dɛɛfoo me Nyankopɔn,\nBoa me memmɔ dawuro,\nMemfa Wo din ho nidie no,\nMenhyehye mmaa nyinaa.",
        en: "My gracious Master and my God,\nAssist me to proclaim,\nTo spread through all the earth abroad,\nThe honours of Thy name." },
      { label: "Verse 3",
        tw: "Yesu' din a ɛtu yɛn suro,\nɛyi yɛn yea yinaa,\nGyegye dɛdɛ bɔnefo asom,\nɛyɛ nkwa ne asomdwoe.",
        en: "Jesus! the name that charms our fears,\nThat bids our sorrows cease;\n'Tis music in the sinner's ears,\n'Tis life and health and peace." },
      { label: "Verse 4",
        tw: "Ɔkasa na wote ne nne a,\nAwufoo nya nkwa bio,\nAwɛrɛbofoo nya anigye,\nHiani brɛfoo gye di.",
        en: "He speaks, and listening to His voice,\nNew life the dead receive;\nThe mournful, broken hearts rejoice;\nThe humble poor believe." },
      { label: "Verse 5",
        tw: "Ɔdwiri bɔne tumi koraa,\nƆtu idaduani duam,\nNe mogya tɛ bonefoo ho,\nɛdi nim ma me nso.",
        en: "He breaks the power of cancelled sin,\nHe sets the prisoner free;\nHis blood can make the foulest clean;\nHis blood availed for me." }
    ]
  },
  {
    num: 35, tw: "Ɔko Kɛseɛ No Wɔawie Ko", en: "The Big Fight Is Finished",
    verses: [
      { label: "Verse 1",
        tw: "Ɔko kɛseɛ no wɔawie ko,\nAfei yɛn sahene adi nim,\nMonfi ahurusi dwom ase,\nHalleluia.",
        en: "The strife is o'er, the battle done;\nNow is the Victor's triumph won;\nO let the song of praise be sung;\nAlleluia!" },
      { label: "Verse 2",
        tw: "Owuo tumi ayɛ bi de,\nNanso Kristo ayi afi ho,\nMummɔ sɛ nto ahurusi dwom,\nHalleluia.",

      { label: "Verse 3",
        tw: "Awɛrɛhoo nnansa no atwam.\nƆde nkonim asore wum,\nNuonyam nka Hene a Ɔasore;\nHalleluia.",

      { label: "Verse 4",
        tw: "Yɛn Wura W'amanɛhunu nti,\nGye Wo nkoa fi wuo bore mu,\nNa yɛanya nkwa ato Wo dwom.\nHalleluia.",
        en: "He broke the age-bound chains of hell;\nThe bars from heaven's high portals fell;\nLet hymns of praise His triumphs tell!\nAlleluia!" }
    ]
  },
  {
    num: 36, tw: "Monyi Nyame Hene Ayɛ", en: "Praise God Our King",
    verses: [
      { label: "Verse 1",
        tw: "Monyi Nyame Hene ayɛ,\nMomfa ayeyie nnwom mma No.",

      { label: "Verse 2",
        tw: "Monhyira No; Ɔayo owia,\nSɛ ɛmmɔ aporo daa nyinaa.",

    ]
  },
  {
    num: 37, tw: "Koko Bi Si No Ho Ara", en: "There Is a Green Hill Far Away",
    verses: [
      { label: "Verse 1",
        tw: "Koko bi si noho ara,\nKuro kɛseɛ n'akyi hɔ,\nNea Wɔsɛn yɛn Wura no,\nOwui gyee yɛn nkwa no.",
        en: "There is a green hill far away,\nWithout a city wall,\nWhere the dear Lord was crucified,\nWho died to save us all." },
      { label: "Verse 2",
        tw: "Yɛnnim nso yɛrentumi nka,\nYea kɛseɛ a Ɔhui,\nNanso yɛgyedi sɛ yɛn nti,\nNa wɔsɛn No wo hɔ.",
        en: "We may not know, we cannot tell\nWhat pains He had to bear;\nBut we believe it was for us\nHe hung and suffered there." },
      { label: "Verse 3",
        tw: "Obiara nni hoa ɔyɛ,\nObetumi bone ayi,\nƆno nko na Ɔbetumi abue,\nƆsoro pon ama yɛn.",
        en: "He died that we might be forgiven,\nHe died to make us good,\nThat we might go at last to heaven,\nSaved by His precious blood." },
      { label: "Verse 4",
        tw: "O! Wadɔ yɛn dɔ kɛse pa,\nɛsɛ sɛ yɛ dɔ no,\nNa yɛatwere Ne Mogya No,\nNa Ɔɛayɛ Nadwuma.",
        en: "O dearly, dearly has He loved!\nAnd we must love Him too,\nAnd trust in His redeeming blood,\nAnd try His works to do." }
    ]
  },
  {
    num: 38, tw: "Ɔbɔne Hu Nyansa Tɛm", en: "Hasten, Sinner, to Be Wise",
    verses: [
      { label: "Verse 1",
        tw: "Ɔbone hu nyansa ntɛm;\nN-twɛn da foforo ansa.\nSɛ woda so po nyansa a,\nɛyɛ dɛn sɛ wobenya.",
        en: "Hasten, sinner, to be wise,\nStay not for the morrow's sun;\nWisdom if you still despise,\nHarder is it to be won." },
      { label: "Verse 2",
        tw: "Su frɛ ahummobo ntɛm;\nNtwɛn da foforɔ ansa,\nAnyɛ a wo bɛrɛ atwam,\nAnsa na owia ato.",
        en: "Hasten, mercy to implore,\nStay not for the morrow's sun;\nLest thy season should be o'er\nEre this evening's stage be run." },
      { label: "Verse 3",
        tw: "Ɔbone, san w'akyi ntɛm,\nNtwɛn da foforo ansa,\nBɛyɛ na wo kanea adum,\nNa nkwahosan aba.",
        en: "Hasten, sinner, to return,\nStay not for the morrow's sun;\nLest thy lamp should cease to burn\nEre salvation's work is done." },
      { label: "Verse 4",
        tw: "Ɔbone yɛ ntɛm gye nhyira,\nN-twɛn da foforɔ ansa,\nAnsa na mmusuo ato wo,\nAnsa na ade akye.",
        en: "Hasten, sinner, Jesus calls,\nStay not for the morrow's sun;\nJudgement then shall come and all\nBless the day His will was done." }
    ]
  },
  {
    num: 39, tw: "Mehia Wo Mmɛrɛ Nyinaa", en: "I Need Thee Every Hour",
    verses: [
      { label: "Verse 1",
        tw: "Mehia wo mmɛrɛ nyinaa,\nAwurade,\nNnɛ bi mma asomdwoe,-\nSɛ Wo de no.",

      { label: "Chorus",
        tw: "Mehia wo ao, mehia wɔ,\nMmɛrɛ nyinaa mehia Wo,\nHyira mɛ sesei m'Agyɛnkwa,\nMaba Wo hɔ.",
        en: "I need Thee, O I need Thee;\nEvery hour I need Thee!\nO bless me now, my Saviour,\nI come to Thee." },
      { label: "Verse 2",
        tw: "Mehia Wo mmɛrɛ nyinaa,\nTwi bɛn me daa,\nWobɛn me a sɔhwɛ,\nNni ahɔɔden.",
        en: "I need Thee every hour,\nStay Thou nearby;\nTemptations lose their power\nWhen Thou art nigh." },
      { label: "Verse 3",
        tw: "Mehia Wo mmɛrɛ nyinaa,\nDɛ ne yea mu,\nBɛtena me nkyɛn, na mma\nƆbra nyɛ kwa.",
        en: "I need Thee every hour,\nIn joy or pain;\nCome quickly and abide,\nOr life is vain." },
      { label: "Verse 4",

        en: "I need Thee every hour,\nTeach me Thy will;\nAnd Thy rich promises\nIn me fulfil." }
    ]
  },
  {
    num: 40, tw: "Yɛgu Aba Anɔpa, Ayamye Aba", en: "Bringing in the Sheaves",
    verses: [
      { label: "Verse 1",
        tw: "Yɛgu aba anɔpa ayamye aba,\nYɛgu aba awia-bɛrɛm ne annwumɛrɛ,\nRehwɛm twahere ne, wɛhere a yɛde twa,\nYɛde anigyeɛ bɛba yɛde aba n'bɛba.",
        en: "Sowing in the morning, sowing seeds of kindness,\nSowing in the noontide and the dewy eve;\nWaiting for the harvest and the time of reaping,\nWe shall come rejoicing, bringing in the sheaves." },
      { label: "Chorus",
        tw: "Yɛde efin'bɛba, yɛde efin'bɛba,\nYɛde anigyeɛ bɛba, yɛde efin'bɛba.",
        en: "Bringing in the sheaves, bringing in the sheaves,\nWe shall come rejoicing, bringing in the sheaves." },
      { label: "Verse 2",
        tw: "Yɛgu aba awiam' yɛgu aba nwin mu.\nYɛnsuro bosuo ana usutɔ bɛrɛ,\nNaama buhɛrɛ nnne adwuma no asa,\nYɛde anigyeɛ bɛba yɛde afin'bɛba.",
        en: "Sowing in the sunshine, sowing in the shadows,\nFearing neither clouds nor winter's chilling breeze;\nBy and by the harvest and the labour ended,\nWe shall come rejoicing, bringing in the sheaves." },
      { label: "Verse 3",
        tw: "Afei fa sukodua, aba no ma Awurade,\nYɛ hwɛrɛ nnɛɛma pii dɛɛ na yɛn wɛrɛ ho,\nNanso yɛ nnusuo bɛsa ma ɔbɛyɛ yɛn atuu,\nYɛde anigyeɛ bɛba, yɛde efi n'bɛba.",
        en: "Going forth with weeping, sowing for the Master,\nThough the loss sustained our spirit often grieves;\nWhen our weeping's over, He will bid us welcome,\nWe shall come rejoicing, bringing in the sheaves." }
    ]
  },
  {
    num: 41, tw: "Yesu Kora Me Asɛnnua Ho", en: "Jesus, Keep Me Near the Cross",
    verses: [
      { label: "Verse 1",
        tw: "Yesu kora me asɛnnua ho,\nDɛɛ nsuo a ɛsom hɔ,\nFi Kalvary bopo so,\nSɛn kwa ma Obiara.",
        en: "Jesus, keep me near the cross;\nThere a precious fountain,\nFree to all, a healing stream\nFlows from Calvary's mountain." },
      { label: "Chorus",
        tw: "W'asɛnnuam W'asɛnnuam.\nNa mɛnhoahoa me ho,\nKosi sɛ owuo akyi,\nMe kra bɛhome daa.",
        en: "In the cross, in the cross,\nBe my glory ever;\nTill my raptured soul shall find\nRest beyond the river." },
      { label: "Verse 2",
        tw: "Wasɛnnua ho, dɔ ne dɔm,\nHuu me kra hiani,\nAdɛkyee nsroma hyɛnhyɛn,\nNe nsrɛmɛn hyerɛn me so.",
        en: "Near the cross, a trembling soul,\nLove and mercy found me;\nThere the Bright and Morning Star\nSheds its beams around me." },
      { label: "Verse 3",
        tw: "Dɛɛ esii W'asɛnnua ho,\nNyame Adwamaa kyerɛ me,\nAo; Boa me na mɛnnante,\nMe nwunu ase daa.",
        en: "Near the cross! O Lamb of God,\nBring its scenes before me;\nHelp my walk from day to day\nWith its shadow o'er me." }
    ]
  },
  {
    num: 42, tw: "Gye Wɔn A Wɔayɛra Wɔn A Wɔrewu", en: "Rescue the Perishing",
    verses: [
      { label: "Verse 1",
        tw: "Gye wɔn a wɔayɛra wɔn a wɔrewu,\nHwim wɔn firi bone ne damoa mu,\nSu ma nea ɔafɔm kwan, ma asɛhwefoo su,\nKa Yesu, Gyefoo ho asɛm Kyerɛ wɔn.",
        en: "Rescue the perishing, care for the dying,\nSnatch them in pity from sin and the grave;\nWeep o'er the erring one, lift up the fallen,\nTell them of Jesus, the mighty to save." },
      { label: "Chorus",
        tw: "Gye wɔn a wɔayɛra, wɔn a wɔrewu,\nYesu yɛ Agyɛnkwa.",
        en: "Rescue the perishing, care for the dying,\nJesus is merciful, Jesus will save." },
      { label: "Verse 2",
        tw: "Onipa koma mu, papa bi wɔ hɔ a,\nNyame dɔm tumi ma efi yi yɛ,\nɛte sɛ sanku a, ne dwom atwa sin,\nƆdɔ nsa ka no a ɛwoso bio.",
        en: "Though they are slighting Him, still He is waiting,\nWaiting the penitent child to receive;\nPlead with them earnestly, plead with them gently;\nHe will forgive if they only believe." },
      { label: "Verse 3",
        tw: "Gye wɔn a wɔayɛra, ɛyɛ w'adwuma,\nAwurade bɛma wo ho ahɔɔden,\nFa boaseto twe wɔn si kwan so,\nSɛ akɔbofoo sɛ Gyefoo awu.",
        en: "Rescue the perishing, duty demands it;\nStrength for thy labor the Lord will provide;\nBack to the narrow way patiently win them;\nTell the poor wanderer a Saviour has died." }
    ]
  },
  {
    num: 43, tw: "Dɛɛ Mete Yi Menni Hwee Ka", en: "Just As I Am",
    verses: [
      { label: "Verse 1",
        tw: "Dɛɛ mete yi menni hwee ka,\nSɛ wohwiee Wo mogya maa me,\nNa Woka sɛ mɛmma Wo ho,\nNyame Adwamma meba.",
        en: "Just as I am, without one plea\nBut that Thy blood was shed for me,\nAnd that Thou bidst me come to Thee,\nO Lamb of God, I come, I come!" },
      { label: "Verse 2",
        tw: "Dɛɛ mete yi merentwen sɛ,\nMepere ma mɛkra ho fi,\nW'oa wo mogya tumi tu fi,\nNyame Adwamma meba.",
        en: "Just as I am, and waiting not\nTo rid my soul of one dark blot;\nTo Thee, whose blood can cleanse each spot,\nO Lamb of God, I come, I come!" },
      { label: "Verse 3",
        tw: "Dɛɛ mete yi, sɛ aperepere,\nƆko ne suro ahyɛ me ma,\nNa akvinnyi him me poa,\nNyame Adwamma meba.",
        en: "Just as I am, though tossed about\nWith many a conflict, many a doubt;\nFightings and fears within, without,\nO Lamb of God, I come, I come!" },
      { label: "Verse 4",
        tw: "Dɛɛ mete yi Wobɛgye me,\nDe akyɛ me ate ne ho,\nMegyɛ W'anosɛm medi nti,\nNyame Adwamma meba.",
        en: "Just as I am, poor, wretched, blind;\nSight, riches, healing of the mind,\nYea, all I need in Thee to find,\nO Lamb of God, I come, I come!" }
    ]
  },
  {
    num: 44, tw: "Wone Me Ntena", en: "Abide with Me",
    verses: [
      { label: "Verse 1",
        tw: "Wone me ntena, ade reyɛ asɛa;\nSum reduru, Awurade tena menkyɛn,\nAboafoo pa, na awɛrɛkyekyefoo sao,\nO Ankonam Boafoo. Wone me ntena.",
        en: "Abide with me; fast falls the eventide;\nThe darkness deepens; Lord, with me abide;\nWhen other helpers fail and comforts flee,\nHelp of the helpless, O abide with me." },
      { label: "Verse 2",
        tw: "Yɛn nkwa da ketewa yi retwam kɔ,\nWiase de repa; n'anuonyam resɛn;\nƆnsɛɛ ne ntakyera nko na mehu ha;\nAo, Wo a Wɔnsakyera da, Wone me ntena.",
        en: "Swift to its close ebbs out life's little day;\nEarth's joys grow dim, its glories pass away;\nChange and decay in all around I see;\nO Thou who changest not, abide with me!" },
      { label: "Verse 3",
        tw: "Mehia Wo wɔ me nkyɛn bɛrɛ nyinaa;\nW'adɔm na ɛka sɔhwɛfoo no hyɛ;\nGyefoo, kyigyinafoo bɛn bɛn ne wo sɛ?\nSum mu o, han mu o, Wone me ntena.",
        en: "I need Thy presence every passing hour;\nWhat but Thy grace can foil the tempter's power?\nWho like Thyself my guide and strength can be?\nThrough cloud and sunshine, O abide with me!" },
      { label: "Verse 4",
        tw: "Sɛ me ne Wo nam a mensuro hwee;\nƆyea nyɛ duru, nnisuo nyɛ nnwono;\nWuo bore, damoa nkonim, ɛwɔ he?\nMedi nkonim daa sɛ Wone me tena a.",
        en: "I fear no foe with Thee at hand to bless;\nIlls have no weight, and tears no bitterness;\nWhere is death's sting? where, grave, thy victory?\nI triumph still, if Thou abide with me." },
      { label: "Verse 5",
        tw: "Memua m'ani a yi Wa'sɛnnua kyerɛme;\nHyerɛn sum mu, kyerɛ me soro kwan;\nƆsoro hyerɛn, wiase kusuu resa;\nOwuo muo, nkwa mu o, Wone me ntena.",
        en: "Hold Thou Thy cross before my closing eyes;\nShine through the gloom, and point me to the skies;\nHeaven's morning breaks, and earth's vain shadows flee;\nIn life, in death, O Lord, abide with me!" }
    ]
  },
  {
    num: 45, tw: "Yesu Me Kra Ne Dɔfo", en: "Jesus, Lover of My Soul",
    verses: [
      { label: "Verse 1",

      { label: "Verse 2",

      { label: "Verse 2",
        tw: "Nyame yi me si hɛ nnɛ ma wo som,\nWo dom no tumi no nti,\nMa me kra mfa anidasoo nhwewo,\nNa me pɛ mmɛn Wo demu.",

      { label: "Verse 3",
        tw: "Ɔdɔ a ɛmu dɔ wɔ hɔ a minnim,\nGyesɛ metwa pɔ teaa no,\nAnigyɛ pii wɔ hɔ a me rennya,\nGyesɛ madu Wo nkyɛn hɔ.",
        en: "There are depths of love that I cannot know\nTill I cross the narrow sea;\nThere are heights of joy that I may not reach\nTill I rest in peace with Thee." }

  },
  {
    num: 50, tw: "Asodie Da Me So", en: "A Charge to Keep I Have",
    verses: [
      { label: "Verse 1",
        tw: "Asodie da me so,\nSɛ mekamfo Nyame,\nMɛgye me kraa ɛnwu da nkwa,\nMa daat soro.",

      { label: "Verse 2",
        tw: "Asom mmɛresantɛn yi,\nAdi me dwuma no,\nAnka mede made nyinaa,\nMayɛ me wura Ne pɛ.",

      { label: "Verse 3",
        tw: "Ma mɛnhwɛ me ho yiye,\nTe sɛ mete wo nkyɛn,\nMe Wura, bɛboa wo Somfoo,\nNa mabu akontaa pa.",

      { label: "Verse 4",
        tw: "Ma mɛnwɛn, memmɔ mpae,\nNa mɛntwere Wo nko,\nSɛ megoro m'adwuma ho a,\nMɛwu wua enni awiei.",

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let hymns = [], filtered = [];
let selectedHymn = null, verse = 0, fontSize = 32;
let presenting = false;
let editIdx = null, veN = 0;

const $ = id => document.getElementById(id);
const T = (id, v) => { const e=$(id); if(e) e.textContent=v; };

function loadHymns() {
  try {
    const s = localStorage.getItem(HYMNS_KEY);
    const custom = s ? JSON.parse(s) : [];
    // Merge: builtin hymns + any user-added ones not in builtin
    const builtinNums = new Set(BUILTIN_HYMNS.map(h=>String(h.num)));
    const extra = custom.filter(h=>!builtinNums.has(String(h.num)));
    return [...BUILTIN_HYMNS, ...extra];
  } catch { return [...BUILTIN_HYMNS]; }
}

function saveHymns() {
  // Only save non-builtin (user-added/edited) hymns
  const builtinNums = new Set(BUILTIN_HYMNS.map(h=>String(h.num)));
  const custom = hymns.filter(h=>!builtinNums.has(String(h.num)));
  try { localStorage.setItem(HYMNS_KEY, JSON.stringify(custom)); } catch {}
}

function filter(q) {
  q = q.toLowerCase().trim();
  filtered = q ? hymns.filter(h=>
    String(h.tw).toLowerCase().includes(q) ||
    String(h.en).toLowerCase().includes(q) ||
    String(h.num).toLowerCase().includes(q)
  ) : [...hymns];
  filtered.sort((a,b)=>String(a.num).localeCompare(String(b.num),undefined,{numeric:true}));
  renderList();
}

function renderList() {
  $('hymn-list').innerHTML = filtered.length===0
    ? '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">No hymns found</div>'
    : filtered.map(h=>`<div class="hymn-item${selectedHymn&&String(selectedHymn.num)===String(h.num)?' active':''}" onclick="pick('${h.num}')">
        <div class="h-num">No. ${h.num}</div>
        <div class="h-tw">${h.tw}</div>
        <div class="h-en">${h.en}</div>
      </div>`).join('');
  $('hymn-count').textContent=`${hymns.length} hymn${hymns.length!==1?'s':''}`;
}

function pick(num) {
  selectedHymn = hymns.find(h=>String(h.num)===String(num));
  verse = 0;
  $('btn-edit').style.display='';
  $('btn-del').style.display='';
  $('present-btn').disabled=false;
  renderList(); renderPresenter();
  if (presenting) renderPres();
}

function renderPresenter() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[verse];
  T('info-tw', selectedHymn.tw);
  T('info-en', `${selectedHymn.en} · No. ${selectedHymn.num}`);
  T('pos-badge', `${verse+1} / ${selectedHymn.verses.length}`);
  $('pos-badge').style.display='';
  $('btn-prev').disabled = verse===0;
  $('btn-next').disabled = verse===selectedHymn.verses.length-1;
  $('preview-empty').style.display='none';
  $('preview-grid').style.display='grid';
  T('pv-lbl-en', v.label); T('pv-lbl-tw', v.label);
  T('prev-en', v.en);      T('prev-tw', v.tw);
  renderStrip();
}

function renderStrip() {
  if (!selectedHymn) return;
  $('verse-strip').innerHTML = selectedHymn.verses.map((v,i)=>{
    const cur  = i===verse;
    const live = presenting && i===verse;
    return `<div class="v-thumb${cur?' cur':''}${live?' live':''}" onclick="jump(${i})">
      <div class="vt-lbl">${v.label}${live?'<span class="air-tag">ON AIR</span>':''}</div>
      <div class="vt-en">${v.en}</div>
      <div class="vt-tw">${v.tw}</div>
    </div>`;
  }).join('');
}

function go(dir) {
  if (!selectedHymn) return;
  const n = verse+dir;
  if (n<0||n>=selectedHymn.verses.length) return;
  jump(n);
}

function jump(i) {
  verse = i;
  renderPresenter();
  if (presenting) renderPres();
}

function chFont(d) {
  fontSize = Math.max(14, Math.min(80, fontSize+d));
  $('fs-val').textContent = fontSize;
  if (presenting) renderPres();
}

function togglePresent() {
  if (!selectedHymn) return;
  presenting ? stopPresenting() : startPresenting();
}

function startPresenting() {
  presenting = true;
  $('pres-view').classList.add('show');
  $('present-btn').textContent = '⏹ Stop';
  $('present-btn').classList.add('active');
  $('pres-badge').classList.add('show');
  renderPres();
  document.documentElement.requestFullscreen?.().catch(()=>{});
}

function stopPresenting() {
  presenting = false;
  $('pres-view').classList.remove('show');
  $('present-btn').textContent = '▶ Present';
  $('present-btn').classList.remove('active');
  $('pres-badge').classList.remove('show');
  if (document.fullscreenElement) document.exitFullscreen?.();
  renderStrip();
}

function renderPres() {
  if (!selectedHymn) return;
  const v = selectedHymn.verses[verse];
  const tot = selectedHymn.verses.length;
  const fs = fontSize;
  T('pres-meta', `No. ${selectedHymn.num} — ${selectedHymn.tw}`);
  T('pres-count', `${verse+1} of ${tot}`);
  T('pres-lbl-en', v.label); T('pres-lbl-tw', v.label);
  T('pres-en', v.en);        T('pres-tw', v.tw);
  T('pres-pos', `${verse+1} / ${tot}`);
  $('pres-en').style.fontSize = `clamp(${fs}px,4.2vw,${fs*2.4}px)`;
  $('pres-tw').style.fontSize = `clamp(${fs}px,4.2vw,${fs*2.4}px)`;
  $('pres-lang-en').style.fontSize = `clamp(12px,1.4vw,18px)`;
  $('pres-lang-tw').style.fontSize = `clamp(12px,1.4vw,18px)`;
  $('pres-lbl-en').style.fontSize  = `clamp(9px,0.9vw,13px)`;
  $('pres-lbl-tw').style.fontSize  = `clamp(9px,0.9vw,13px)`;
  $('pnav-prev').disabled = verse===0;
  $('pnav-next').disabled = verse===tot-1;
  renderStrip();
}

document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-bg.show')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); go(1); }
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); go(-1); }
  else if (e.key==='Escape') { if(presenting) stopPresenting(); }
  else if (e.key==='F5'&&selectedHymn) { e.preventDefault(); togglePresent(); }
});

function openModal(num) {
  editIdx=null; veN=0;
  $('m-num').value=''; $('m-tw').value=''; $('m-en').value='';
  $('v-editors').innerHTML='';
  $('modal-title').textContent='Add New Hymn';
  if (num!=null) {
    const h=hymns.find(x=>String(x.num)===String(num)); if(!h) return;
    editIdx=hymns.indexOf(h);
    $('modal-title').textContent='Edit Hymn';
    $('m-num').value=h.num; $('m-tw').value=h.tw; $('m-en').value=h.en;
    h.verses.forEach(v=>addVE(v.label,v.en,v.tw));
  }
  $('modal-bg').classList.add('show');
}
function closeModal() { $('modal-bg').classList.remove('show'); }
function closeMBg(e) { if(e.target===$('modal-bg')) closeModal(); }

function addVE(lb, en='', tw='') {
  veN++;
  const n = document.querySelectorAll('.verse-editor').length;
  const label = lb==='Verse'?`Verse ${n+1}`:lb;
  const id = 've_'+veN;
  const d = document.createElement('div');
  d.className='verse-editor'; d.id=id;
  d.innerHTML=`<div class="ve-head">
    <input type="text" value="${label}"/>
    <button class="rm-v" onclick="document.getElementById('${id}').remove()">✕</button>
  </div>
  <div class="ve-cols">
    <div><div class="ve-lbl" style="color:var(--blue)">English</div><textarea placeholder="English text...">${en}</textarea></div>
    <div><div class="ve-lbl" style="color:var(--gold)">Twi</div><textarea placeholder="Twi text...">${tw}</textarea></div>
  </div>`;
  $('v-editors').appendChild(d);
}

function saveHymn() {
  const num=$('m-num').value.trim();
  const tw=$('m-tw').value.trim();
  const en=$('m-en').value.trim();
  if(!num||!tw||!en){alert('Please fill in number and both titles.');return;}
  const verses=[];
  document.querySelectorAll('.verse-editor').forEach(div=>{
    const label=div.querySelector('input').value.trim();
    const [a,b]=div.querySelectorAll('textarea');
    if(a.value.trim()) verses.push({label,en:a.value.trim(),tw:b.value.trim()});
  });
  if(!verses.length){alert('Please add at least one verse.');return;}
  const h={num,tw,en,verses};
  if(editIdx!==null){ hymns[editIdx]=h; if(selectedHymn&&String(selectedHymn.num)===String(num)) selectedHymn=h; }
  else {
    if(hymns.find(x=>String(x.num)===String(num))){alert(`Hymn ${num} already exists.`);return;}
    hymns.push(h);
  }
  hymns.sort((a,b)=>String(a.num).localeCompare(String(b.num),undefined,{numeric:true}));
  saveHymns(); closeModal();
  filter($('search').value);
  if(selectedHymn) renderPresenter();
}

function delHymn() {
  if(!selectedHymn||!confirm(`Delete "${selectedHymn.tw}"?`)) return;
  hymns=hymns.filter(h=>String(h.num)!==String(selectedHymn.num));
  selectedHymn=null; verse=0;
  saveHymns();
  $('btn-edit').style.display='none'; $('btn-del').style.display='none';
  $('preview-grid').style.display='none'; $('preview-empty').style.display='flex';
  $('verse-strip').innerHTML=''; $('present-btn').disabled=true;
  $('pos-badge').style.display='none';
  T('info-tw','No hymn selected'); T('info-en','');
  $('btn-prev').disabled=true; $('btn-next').disabled=true;
  filter($('search').value);
}

// Init
hymns = loadHymns();
filter('');
$('preview-grid').style.display='none';
$('present-btn').disabled=true;
$('pos-badge').style.display='none';
</script>
</body>
</html>
